<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LingxY Dock</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        min-width: 0;
        min-height: 0;
        max-width: 100vw;
        max-height: 100vh;
        overflow: hidden;
        overflow: clip;
        background: transparent;
        scrollbar-width: none;
        overscroll-behavior: none;
      }
      body {
        /* Window content bounds are 48x48 (see manifest.mjs), but renderer
           layout must follow the viewport. A persisted Chromium zoom setting
           can make fixed 48px CSS boxes larger than the content viewport and
           trigger native scrollbars in this tiny HUD window. */
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        min-width: 0;
        min-height: 0;
        max-width: 100vw;
        max-height: 100vh;
        background: transparent;
        display: block;
        contain: layout paint style;
        overflow: hidden !important;
        overflow: clip;
        scrollbar-width: none;
        overscroll-behavior: none;
        user-select: none;
      }
      html::-webkit-scrollbar,
      body::-webkit-scrollbar,
      *::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none;
      }

      #dockButton {
        position: fixed;
        inset: 0;
        display: block;
        width: 100vw;
        height: 100vh;
        max-width: 100vw;
        max-height: 100vh;
        min-width: 0; min-height: 0;
        border-radius: 50%;
        border: none;
        cursor: grab;
        background: transparent;
        padding: 0;
        overflow: hidden !important;
        overflow: clip;
        appearance: none;
        contain: layout paint style;
        transition: filter 0.18s ease, transform 0.18s ease;
      }

      #dockButton:hover { filter: drop-shadow(0 0 8px rgba(255,112,67,0.35)); }
      #dockButton:active { transform: scale(0.94); }
      #dockButton.dragover { filter: drop-shadow(0 0 10px rgba(34,197,94,0.45)); }

      canvas {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        pointer-events: none;
      }

      .clip-badge {
        position: absolute;
        bottom: 1px; left: 50%;
        transform: translateX(-50%);
        padding: 1px 6px;
        border-radius: 5px;
        background: rgba(255,255,255,0.88);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(0,0,0,0.06);
        color: #555;
        font-family: system-ui, sans-serif;
        font-size: 8px;
        white-space: nowrap;
        max-width: calc(100vw - 4px);
        overflow: hidden; text-overflow: ellipsis;
        opacity: 0; pointer-events: none;
        transition: opacity 200ms;
        z-index: 10;
      }

      #dockButton.clipboard-ready .clip-badge { opacity: 1; }

      /* UCA-069: task completion badge */
      .task-badge {
        position: absolute;
        top: 1px; right: 1px;
        min-width: 16px; height: 16px;
        padding: 0 4px;
        border-radius: 8px;
        background: #22c55e;
        color: #fff;
        font-family: system-ui, sans-serif;
        font-size: 9px;
        font-weight: 700;
        line-height: 16px;
        text-align: center;
        opacity: 0; pointer-events: none;
        transition: opacity 300ms;
        z-index: 10;
      }
      #dockButton.has-completed .task-badge { opacity: 1; }

      /* subtle green breathing ring when completed tasks are waiting */
      @keyframes breathe-ring {
        0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
        50%       { box-shadow: 0 0 0 3px rgba(34,197,94,0.35); }
      }
      #dockButton.has-completed { animation: breathe-ring 2.4s ease-in-out infinite; }

      .recording-badge {
        position: absolute;
        top: 1px; right: 1px;
        padding: 2px 5px;
        border-radius: 999px;
        background: #ef4444;
        color: #fff;
        font-family: system-ui, sans-serif;
        font-size: 8px;
        font-weight: 800;
        letter-spacing: 0.04em;
        opacity: 0;
        pointer-events: none;
        z-index: 12;
        box-shadow: 0 0 0 3px rgba(239,68,68,0.18);
      }

      #dockButton.recording .recording-badge { opacity: 1; }
      #dockButton.recording {
        animation: recording-ring 1.2s ease-in-out infinite;
      }

      @keyframes recording-ring {
        0%, 100% { filter: drop-shadow(0 0 0 rgba(239,68,68,0)); }
        50% { filter: drop-shadow(0 0 8px rgba(239,68,68,0.72)); }
      }

      /* Echo mode live indicator — small green dot telling the user the
         wake-word recognizer is actively listening. Bottom-right of orb. */
      .echo-badge {
        position: absolute;
        bottom: 2px; right: 2px;
        width: 10px; height: 10px;
        border-radius: 50%;
        background: #22c55e;
        border: 2px solid #0f0f1a;
        opacity: 0;
        pointer-events: none;
        z-index: 11;
        transition: opacity 200ms, transform 200ms;
      }
      #dockButton.echo-on .echo-badge { opacity: 1; }
      #dockButton.echo-listening .echo-badge {
        animation: echo-pulse 1.2s ease-in-out infinite;
      }
      @keyframes echo-pulse {
        0%, 100% { transform: scale(1);   box-shadow: 0 0 0 0 rgba(34,197,94,0); }
        50%      { transform: scale(1.3); box-shadow: 0 0 0 4px rgba(34,197,94,0.35); }
      }
    </style>
  </head>
  <body>
    <button id="dockButton" type="button" title="LingxY">
      <canvas id="orbCanvas" width="48" height="48"></canvas>
      <span id="clipBadge" class="clip-badge"></span>
      <span id="taskBadge" class="task-badge"></span>
      <span id="recordingBadge" class="recording-badge">REC</span>
      <span id="echoBadge" class="echo-badge" title="Echo 模式：正在监听"></span>
    </button>

    <script>
      const canvas = document.getElementById('orbCanvas');
      const ctx = canvas.getContext('2d');
      const S = 48, CX = S / 2, CY = S / 2, R = 21;
      // 3 s cycle at ~60 fps
      const CYCLE = 180;

      let mode = 'idle';           // 'idle' | 'active' | 'recording' | 'echo-listening'
      let activePhase = 'thinking'; // only when mode === 'active': 'thinking' | 'executing'
      let activeStartT = 0;
      let t = 0;
      let pulseRings = [];
      let completedBurst = null;   // {t0, age}

      /* ─── shared: dark gradient disc matching icon.html ─── */
      function darkDisc(glowAlpha, glowBlur) {
        const g = ctx.createLinearGradient(CX - 14, CY - 14, CX + 14, CY + 14);
        g.addColorStop(0, '#2a2c35');
        g.addColorStop(1, '#18191f');
        ctx.save();
        if (glowAlpha > 0) {
          ctx.shadowColor = `rgba(255,112,67,${glowAlpha})`;
          ctx.shadowBlur  = glowBlur;
        }
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(CX, CY, R, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
        // hairline border
        ctx.save();
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(CX, CY, R - 0.5, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
      }

      /* ═══════ shared: particle collision scene ═══════ */
      function drawParticleBase() {
        ctx.clearRect(0, 0, S, S);

        const phase  = (t % CYCLE) / CYCLE;
        const sine   = Math.sin(phase * Math.PI * 2);

        const glowA  = 0.1 + Math.max(0, sine) * 0.3;
        const glowB  = 8   + Math.max(0, sine) * 14;
        darkDisc(glowA, glowB);

        // Ring 2: solid coral, rotating reverse, r=19
        ctx.save();
        ctx.translate(CX, CY);
        ctx.rotate(-(t / 1080) * Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,112,67,0.13)';
        ctx.lineWidth = 0.9;
        ctx.beginPath(); ctx.arc(0, 0, 19, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();

        // Ring 1: dashed gold, rotating forward, r=15
        ctx.save();
        ctx.translate(CX, CY);
        ctx.rotate((t / 720) * Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,183,77,0.35)';
        ctx.lineWidth = 0.9;
        ctx.setLineDash([3, 2.5]);
        ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI * 2); ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();

        // pPhase: 0 = separated, 1 = collision
        const pPhase = 0.5 - 0.5 * Math.cos(phase * Math.PI * 2);
        const pSize  = 3.5 * (0.6 + pPhase * 0.6);
        const pAlpha = 0.6 + pPhase * 0.4;

        // p1: gold, left → center
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        ctx.globalAlpha = pAlpha;
        ctx.shadowColor = '#ffb74d'; ctx.shadowBlur = 7;
        ctx.fillStyle   = '#ffb74d';
        ctx.beginPath();
        ctx.arc(CX + (-12 + pPhase * 15), CY + (3 - pPhase * 3), pSize, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // p2: coral, right → center
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        ctx.globalAlpha = pAlpha;
        ctx.shadowColor = '#ff7043'; ctx.shadowBlur = 7;
        ctx.fillStyle   = '#ff7043';
        ctx.beginPath();
        ctx.arc(CX + (12 - pPhase * 15), CY + (-3 + pPhase * 3), pSize, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Spark: white flash at collision (phase 0.45–0.60)
        let sparkA = 0, sparkR = 0;
        if (phase > 0.45 && phase <= 0.50) {
          const sp = (phase - 0.45) / 0.05;
          sparkA = sp; sparkR = 3 * sp;
        } else if (phase > 0.50 && phase <= 0.60) {
          const sp = (phase - 0.50) / 0.10;
          sparkA = 1 - sp; sparkR = 3 + 4 * sp;
        }
        if (sparkA > 0.01) {
          ctx.save();
          ctx.globalCompositeOperation = 'overlay';
          ctx.globalAlpha = sparkA;
          ctx.shadowColor = 'rgba(255,230,200,0.9)'; ctx.shadowBlur = sparkR * 4;
          ctx.fillStyle = '#ffffff';
          ctx.beginPath(); ctx.arc(CX, CY, sparkR, 0, Math.PI * 2); ctx.fill();
          ctx.restore();
        }
      }

      /* ═══════ IDLE ═══════ */
      function drawIdle() {
        drawParticleBase();
      }

      /* ═══════ ACTIVE: two-phase visualization ═══════
         thinking  — 5 orbiting indigo dots drift toward center with a soft
                     breathing halo (narrates "planning")
         executing — dots expand back to an orbit, with occasional spark
                     flashes at random angles (narrates "doing work")
         Phase is advanced by the JS side via __orbApi.setPhase(...). */
      function drawActive() {
        drawParticleBase();
        const phaseT = (t - activeStartT);

        if (activePhase === 'thinking') {
          // breathing halo
          const b = 0.5 + 0.5 * Math.sin(phaseT * 0.08);
          ctx.save();
          ctx.strokeStyle = `rgba(129,140,248,${0.25 + b * 0.3})`;
          ctx.lineWidth = 1.2;
          ctx.beginPath(); ctx.arc(CX, CY, R - 3 - b * 2, 0, Math.PI * 2); ctx.stroke();
          ctx.restore();
          // 5 particles oscillating radially toward/away from center
          for (let i = 0; i < 5; i += 1) {
            const ang = (i / 5) * Math.PI * 2 + phaseT * 0.012;
            const rad = 5 + 8 * (0.5 + 0.5 * Math.sin(phaseT * 0.05 + i));
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            ctx.shadowColor = '#818cf8'; ctx.shadowBlur = 6;
            ctx.fillStyle = 'rgba(165,180,252,0.9)';
            ctx.beginPath();
            ctx.arc(CX + Math.cos(ang) * rad, CY + Math.sin(ang) * rad, 1.8, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
        } else {
          // executing — rotating arc (fast) + orbiting dots + sparks
          const arcLen   = Math.PI * 1.1 + Math.sin(phaseT * 0.06) * 0.4;
          const arcStart = (phaseT * 0.075) - Math.PI / 2;
          ctx.save();
          ctx.strokeStyle = 'rgba(134,239,172,0.75)';
          ctx.lineWidth = 1.8; ctx.lineCap = 'round';
          ctx.beginPath(); ctx.arc(CX, CY, R - 2.5, arcStart, arcStart + arcLen); ctx.stroke();
          ctx.restore();
          // 3 orbiting dots (coral/gold/green)
          const orbits = [
            { r: 13, speed: 0.09,  color: '#ffb74d', phase: 0 },
            { r: 13, speed: -0.11, color: '#86efac', phase: 2.1 },
            { r: 13, speed: 0.13,  color: '#ff7043', phase: 4.2 }
          ];
          for (const o of orbits) {
            const ang = phaseT * o.speed + o.phase;
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            ctx.shadowColor = o.color; ctx.shadowBlur = 6;
            ctx.fillStyle = o.color;
            ctx.beginPath();
            ctx.arc(CX + Math.cos(ang) * o.r, CY + Math.sin(ang) * o.r, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
          // rare spark flash
          if ((t | 0) % 72 === 0 && Math.random() < 0.35) {
            pulseRings.push({ r: 4, a: 0.6 });
          }
        }

        // expanding pulse rings (spark flashes + drop-file pulse)
        pulseRings = pulseRings.filter(ring => {
          ring.r += 0.7; ring.a *= 0.9;
          if (ring.a < 0.03) return false;
          ctx.save();
          ctx.globalAlpha = ring.a;
          ctx.strokeStyle = 'rgba(255,255,255,0.8)';
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.arc(CX, CY, ring.r, 0, Math.PI * 2); ctx.stroke();
          ctx.restore();
          return true;
        });
      }

      /* ═══════ COMPLETED: one-shot expanding green ring ═══════ */
      function drawCompleted() {
        drawParticleBase();
        if (!completedBurst) return;
        completedBurst.age = t - completedBurst.t0;
        const dur = 36; // ~600ms @60fps
        if (completedBurst.age > dur) {
          completedBurst = null;
          mode = 'idle';
          return;
        }
        const p = completedBurst.age / dur;
        ctx.save();
        ctx.globalAlpha = 1 - p;
        ctx.strokeStyle = 'rgba(134,239,172,1)';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(CX, CY, R - 2 + p * 12, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
      }

      /* ═══════ ECHO-LISTENING: soft green listening ring ═══════ */
      function drawEchoListening() {
        drawParticleBase();
        const b = 0.5 + 0.5 * Math.sin(t * 0.12);
        ctx.save();
        ctx.strokeStyle = `rgba(134,239,172,${0.55 + b * 0.35})`;
        ctx.lineWidth = 1.4;
        ctx.beginPath(); ctx.arc(CX, CY, R - 2 + b * 1.5, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
      }

      function doPulse() { pulseRings.push({ r: R, a: 0.5 }); }

      function drawRecording() {
        drawActive();

        const beat = 0.55 + 0.45 * Math.sin(t * 0.16);
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        ctx.shadowColor = 'rgba(239,68,68,0.95)';
        ctx.shadowBlur = 10 + beat * 8;
        ctx.fillStyle = `rgba(239,68,68,${0.75 + beat * 0.25})`;
        ctx.beginPath(); ctx.arc(CX, CY, 4.5 + beat * 1.3, 0, Math.PI * 2); ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = `rgba(239,68,68,${0.28 + beat * 0.25})`;
        ctx.lineWidth = 1.4;
        ctx.beginPath(); ctx.arc(CX, CY, R - 5 + beat * 2.5, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
      }

      function animate() {
        t++;
        if (mode === 'recording') drawRecording();
        else if (mode === 'active') drawActive();
        else if (mode === 'completed') drawCompleted();
        else if (mode === 'echo-listening') drawEchoListening();
        else drawIdle();
        requestAnimationFrame(animate);
      }

      window.__orbApi = {
        activate(phase = 'thinking') {
          if (mode !== 'active') {
            mode = 'active';
            activeStartT = t;
          }
          activePhase = phase;
        },
        setPhase(phase) {
          if (mode === 'active' && phase !== activePhase) {
            activePhase = phase;
            activeStartT = t;
          }
        },
        deactivate() {
          if (mode === 'active') {
            // Burst a "completed" ring before returning to idle so the user
            // sees a finish cue instead of the orb just stopping.
            mode = 'completed';
            completedBurst = { t0: t, age: 0 };
            pulseRings = [];
          }
        },
        recording(active) {
          mode = active ? 'recording' : 'idle';
          if (!active) pulseRings = [];
        },
        echoListening(active) {
          if (active) mode = 'echo-listening';
          else if (mode === 'echo-listening') mode = 'idle';
        },
        pulse() { doPulse(); }
      };

      animate();
    </script>
    <script type="module" src="./i18n-dom-bootstrap.mjs"></script>
    <script type="module" src="./dock.js"></script>
  </body>
</html>
