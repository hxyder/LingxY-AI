<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UCA Dock</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        width: 64px; height: 64px;
        background: transparent;
        display: grid; place-items: center;
        overflow: hidden;
      }

      #dockButton {
        position: relative;
        width: 48px; height: 48px;
        border-radius: 50%;
        border: none;
        cursor: grab;
        background: transparent;
        padding: 0;
        overflow: hidden;
        transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      #dockButton:hover { transform: scale(1.12); }
      #dockButton:active { transform: scale(0.94); }
      #dockButton.dragover { transform: scale(1.18); }

      canvas { display: block; border-radius: 50%; }

      .clip-badge {
        position: absolute;
        bottom: -3px; left: 50%;
        transform: translateX(-50%);
        padding: 1px 6px;
        border-radius: 5px;
        background: rgba(255,255,255,0.88);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(0,0,0,0.06);
        color: #555;
        font-family: system-ui, sans-serif;
        font-size: 8px;
        white-space: nowrap;
        max-width: 80px;
        overflow: hidden; text-overflow: ellipsis;
        opacity: 0; pointer-events: none;
        transition: opacity 200ms;
        z-index: 10;
      }

      #dockButton.clipboard-ready .clip-badge { opacity: 1; }

      /* UCA-069: task completion badge */
      .task-badge {
        position: absolute;
        top: -2px; right: -2px;
        min-width: 16px; height: 16px;
        padding: 0 4px;
        border-radius: 8px;
        background: #22c55e;
        color: #fff;
        font-family: system-ui, sans-serif;
        font-size: 9px;
        font-weight: 700;
        line-height: 16px;
        text-align: center;
        opacity: 0; pointer-events: none;
        transition: opacity 300ms;
        z-index: 10;
      }
      #dockButton.has-completed .task-badge { opacity: 1; }

      /* subtle green breathing ring when completed tasks are waiting */
      @keyframes breathe-ring {
        0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
        50%       { box-shadow: 0 0 0 5px rgba(34,197,94,0.35); }
      }
      #dockButton.has-completed { animation: breathe-ring 2.4s ease-in-out infinite; }
    </style>
  </head>
  <body>
    <button id="dockButton" type="button" title="UCA">
      <canvas id="orbCanvas" width="48" height="48"></canvas>
      <span id="clipBadge" class="clip-badge"></span>
      <span id="taskBadge" class="task-badge"></span>
    </button>

    <script>
      const canvas = document.getElementById('orbCanvas');
      const ctx = canvas.getContext('2d');
      const S = 48, CX = S / 2, CY = S / 2;

      let mode = 'idle';
      let t = 0;
      let particles = [];

      /* ═══════ IDLE: dark glass orb with subtle color hints ═══════ */
      function drawIdle() {
        ctx.clearRect(0, 0, S, S);

        const breath = 0.92 + Math.sin(t * 0.02) * 0.08;

        // dark base disc
        const base = ctx.createRadialGradient(CX - 2, CY - 3, 2, CX, CY, 22 * breath);
        base.addColorStop(0, 'rgba(70, 75, 92, 0.95)');
        base.addColorStop(0.45, 'rgba(40, 44, 58, 0.9)');
        base.addColorStop(0.85, 'rgba(22, 24, 34, 0.75)');
        base.addColorStop(1, 'rgba(15, 17, 26, 0)');
        ctx.fillStyle = base;
        ctx.beginPath(); ctx.arc(CX, CY, 22, 0, Math.PI * 2); ctx.fill();

        // subtle inner color tint (cool indigo + warm rose)
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        const tint1 = ctx.createRadialGradient(CX - 4, CY - 2, 0, CX - 4, CY - 2, 12);
        tint1.addColorStop(0, 'rgba(99, 102, 241, 0.55)');
        tint1.addColorStop(1, 'rgba(99, 102, 241, 0)');
        ctx.fillStyle = tint1;
        ctx.beginPath(); ctx.arc(CX - 4, CY - 2, 12, 0, Math.PI * 2); ctx.fill();

        const tint2 = ctx.createRadialGradient(CX + 4, CY + 3, 0, CX + 4, CY + 3, 11);
        tint2.addColorStop(0, 'rgba(236, 72, 153, 0.45)');
        tint2.addColorStop(1, 'rgba(236, 72, 153, 0)');
        ctx.fillStyle = tint2;
        ctx.beginPath(); ctx.arc(CX + 4, CY + 3, 11, 0, Math.PI * 2); ctx.fill();
        ctx.restore();

        // bright glass highlight
        ctx.save();
        ctx.globalAlpha = 0.72;
        const hi = ctx.createRadialGradient(CX - 4, CY - 6, 0, CX - 3, CY - 5, 6);
        hi.addColorStop(0, 'rgba(255, 255, 255, 0.95)');
        hi.addColorStop(0.7, 'rgba(255, 255, 255, 0.15)');
        hi.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = hi;
        ctx.beginPath();
        ctx.ellipse(CX - 3, CY - 5, 5, 3, -0.4, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // crisp rim
        ctx.save();
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.arc(CX, CY, 21 * breath, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      /* ═══════ ACTIVE: dark glass orb with colorful orbiting lights ═══════ */
      function drawActive() {
        ctx.clearRect(0, 0, S, S);

        // dark base disc — same as idle
        const breath = 0.92 + Math.sin(t * 0.04) * 0.08;
        const base = ctx.createRadialGradient(CX - 2, CY - 3, 2, CX, CY, 22 * breath);
        base.addColorStop(0, 'rgba(70, 75, 92, 0.95)');
        base.addColorStop(0.45, 'rgba(40, 44, 58, 0.92)');
        base.addColorStop(0.85, 'rgba(22, 24, 34, 0.78)');
        base.addColorStop(1, 'rgba(15, 17, 26, 0)');
        ctx.fillStyle = base;
        ctx.beginPath(); ctx.arc(CX, CY, 22, 0, Math.PI * 2); ctx.fill();

        // three orbiting colored dots
        const sp = t * 0.09;
        const dist = 10 + Math.sin(t * 0.05) * 2.5;
        const colors = [
          { h: 165, s: 85, l: 55 },  // teal
          { h: 280, s: 75, l: 62 },  // violet
          { h: 35,  s: 95, l: 60 }   // amber
        ];

        for (let i = 0; i < 3; i++) {
          const angle = sp + i * Math.PI * 2 / 3;
          const x = CX + Math.cos(angle) * dist;
          const y = CY + Math.sin(angle) * dist * 0.7;
          const c = colors[i];

          // trail
          for (let j = 1; j <= 4; j++) {
            const ta = angle - j * 0.14;
            const tx = CX + Math.cos(ta) * dist;
            const ty = CY + Math.sin(ta) * dist * 0.7;
            ctx.save();
            ctx.globalAlpha = (5 - j) / 5 * 0.45;
            ctx.fillStyle = `hsl(${c.h}, ${c.s}%, ${c.l}%)`;
            ctx.beginPath(); ctx.arc(tx, ty, 2.8 - j * 0.35, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
          }

          // bright dot with glow
          const dg = ctx.createRadialGradient(x, y, 0, x, y, 5.5);
          dg.addColorStop(0, `hsla(${c.h}, 95%, 88%, 1)`);
          dg.addColorStop(0.35, `hsla(${c.h}, ${c.s}%, ${c.l}%, 0.9)`);
          dg.addColorStop(0.7, `hsla(${c.h}, ${c.s}%, ${c.l}%, 0.3)`);
          dg.addColorStop(1, 'transparent');
          ctx.fillStyle = dg;
          ctx.shadowBlur = 6;
          ctx.shadowColor = `hsl(${c.h}, ${c.s}%, ${c.l}%)`;
          ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill();
          ctx.shadowBlur = 0;
        }

        // bright white center pulse
        const core = ctx.createRadialGradient(CX, CY, 0, CX, CY, 5);
        core.addColorStop(0, 'rgba(255,255,255,0.95)');
        core.addColorStop(0.5, 'rgba(220,225,255,0.5)');
        core.addColorStop(1, 'rgba(180,190,240,0)');
        ctx.fillStyle = core;
        ctx.beginPath(); ctx.arc(CX, CY, 4.5, 0, Math.PI * 2); ctx.fill();

        // glass highlight (consistent with idle)
        ctx.save();
        ctx.globalAlpha = 0.55;
        const hi = ctx.createRadialGradient(CX - 3, CY - 5, 0, CX - 3, CY - 5, 5);
        hi.addColorStop(0, 'rgba(255, 255, 255, 0.85)');
        hi.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = hi;
        ctx.beginPath();
        ctx.ellipse(CX - 3, CY - 5, 5, 3, -0.4, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // particles
        particles = particles.filter(p => {
          p.x += p.vx; p.y += p.vy; p.vx *= 0.94; p.vy *= 0.94; p.life -= p.decay;
          if (p.life <= 0) return false;
          ctx.save();
          ctx.globalAlpha = p.life * 0.8;
          ctx.fillStyle = `hsla(${p.hue}, 85%, 68%, 1)`;
          ctx.shadowBlur = 3;
          ctx.shadowColor = `hsla(${p.hue}, 85%, 68%, 0.6)`;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
          ctx.restore();
          return true;
        });

        // sparkles
        if (Math.random() < 0.15) {
          const a = Math.random() * Math.PI * 2;
          particles.push({
            x: CX + Math.cos(a) * 13, y: CY + Math.sin(a) * 10,
            vx: (Math.random() - 0.5) * 0.6, vy: (Math.random() - 0.5) * 0.6,
            life: 1, decay: 0.035, hue: [165, 280, 35, 200, 340][Math.floor(Math.random() * 5)], size: 1.2 + Math.random()
          });
        }
      }

      /* ═══════ PULSE ═══════ */
      function doPulse() {
        const hues = [165, 280, 35, 200, 50];
        for (let i = 0; i < 10; i++) {
          const a = Math.random() * Math.PI * 2;
          const spd = 0.8 + Math.random() * 1.5;
          particles.push({
            x: CX, y: CY,
            vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
            life: 1, decay: 0.018, hue: hues[i % 5], size: 1.5 + Math.random() * 1.5
          });
        }
      }

      function animate() {
        t++;
        if (mode === 'active') { drawActive(); } else {
          drawIdle();
          if (particles.length > 0) {
            particles = particles.filter(p => {
              p.x += p.vx; p.y += p.vy; p.vx *= 0.94; p.vy *= 0.94; p.life -= p.decay;
              if (p.life <= 0) return false;
              ctx.save();
              ctx.globalAlpha = p.life * 0.8;
              ctx.fillStyle = `hsla(${p.hue}, 85%, 68%, 1)`;
              ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
              ctx.restore();
              return true;
            });
          }
        }
        requestAnimationFrame(animate);
      }

      window.__orbApi = {
        activate() { mode = 'active'; },
        deactivate() { if (mode === 'active') { mode = 'idle'; particles = []; } },
        pulse() { doPulse(); }
      };

      animate();
    </script>
    <script type="module" src="./dock.js"></script>
  </body>
</html>
