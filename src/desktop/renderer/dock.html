<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UCA Dock</title>
    <link rel="stylesheet" href="./shared.css">
    <style>
      body {
        min-height: 100vh;
        padding: 0;
        background: transparent;
      }

      .dock-shell {
        width: 100%;
        height: 100vh;
        display: grid;
        place-items: center;
      }

      .dock-button {
        width: 92px;
        height: 92px;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.45);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.08) 42%),
          linear-gradient(160deg, rgba(163, 58, 22, 0.96), rgba(117, 34, 15, 0.96));
        color: white;
        box-shadow: 0 20px 40px rgba(84, 26, 8, 0.32);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        text-align: center;
        padding: 10px;
      }

      .dock-button.dragover {
        transform: scale(1.04);
        box-shadow: 0 24px 56px rgba(84, 26, 8, 0.4);
      }

      .dock-label {
        font-size: 11px;
        line-height: 1.35;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .dock-icon {
        font-size: 22px;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main class="dock-shell">
      <button id="dockButton" class="dock-button" type="button" title="点击打开 UCA，或把文件拖到这里">
        <span class="dock-icon">UCA</span>
        <span class="dock-label">拖文件到这里</span>
      </button>
    </main>
    <script type="module" src="./dock.js"></script>
  </body>
</html>
