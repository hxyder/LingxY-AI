<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UCA</title>
    <link rel="stylesheet" href="./shared.css">
    <style>
      html, body {
        height: 100%;
        background: transparent;
        overflow: hidden;
      }

      body {
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        padding: 0 0 24px;
        font-family: -apple-system, "SF Pro Text", "SF Pro Display", "Segoe UI Variable Text", "Segoe UI", "PingFang SC", "Microsoft YaHei UI", system-ui, sans-serif;
        /* transparent window — no drag region needed */
      }

      /* Apple-style auto-hide: when overlay is "popping" (no user engagement)
         the chrome subtly fades out, then JS hides the window. */
      body.popping .quick-toolbar,
      body.popping .input-bar {
        opacity: 0;
        transform: translateY(8px);
        pointer-events: none;
        transition: opacity 280ms ease, transform 280ms ease;
      }

      body.popping .bubble-area {
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 280ms ease, transform 280ms ease;
      }

      body.voice-mode .quick-toolbar,
      body.voice-mode .input-bar,
      body.voice-mode .bubble-area,
      body.voice-mode #schedulePanel {
        display: none !important;
      }

      /* ── bubble conversation area ── */
      .bubble-area {
        width: 520px;
        max-height: 420px;
        overflow-y: auto;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 14px 18px;
        margin-bottom: 10px;
        border-radius: 22px 22px 8px 8px;
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(40px) saturate(180%);
        -webkit-backdrop-filter: blur(40px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow:
          0 24px 60px rgba(0, 0, 0, 0.14),
          0 4px 16px rgba(0, 0, 0, 0.05),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);
        -webkit-app-region: no-drag;
        scrollbar-width: thin;
        scrollbar-color: rgba(0,0,0,0.12) transparent;
        transition: opacity 240ms ease, transform 240ms ease;
      }

      .bubble-area:empty,
      .bubble-area[hidden] {
        display: none;
      }

      /* ── bubbles ── */
      .bubble {
        max-width: 85%;
        padding: 10px 14px;
        border-radius: 14px;
        font-size: 13px;
        line-height: 1.55;
        word-break: break-word;
        animation: bubble-in 180ms ease;
      }

      .bubble.assistant {
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid var(--line);
        border-bottom-left-radius: 4px;
        box-shadow: var(--shadow-sm);
      }

      .bubble.user {
        align-self: flex-end;
        background: var(--accent);
        color: #fff;
        border-bottom-right-radius: 4px;
        box-shadow: 0 2px 8px rgba(99, 102, 241, 0.2);
      }

      .bubble.system {
        align-self: center;
        max-width: 100%;
        font-size: 11px;
        color: var(--muted);
        background: rgba(107, 114, 128, 0.06);
        border-radius: 8px;
        padding: 6px 12px;
      }

      /* ── inline option buttons inside bubbles ── */
      .bubble-options {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }

      .bubble-options button {
        font-size: 12px;
        padding: 5px 12px;
        border-radius: var(--radius-pill);
        background: var(--surface-strong);
        border: 1px solid var(--line);
        color: var(--ink);
        font-weight: 500;
      }

      .bubble-options button:hover {
        background: var(--accent-soft);
        border-color: var(--accent);
        color: var(--accent-strong);
      }

      .bubble-options button.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      /* ── context chips (attached files / web context) ── */
      .context-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        border-radius: var(--radius-pill);
        font-size: 12px;
        background: rgba(99, 102, 241, 0.08);
        border: 1px solid rgba(99, 102, 241, 0.15);
        color: var(--accent-strong);
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .context-chip .dismiss {
        width: 14px;
        height: 14px;
        border: none;
        background: none;
        color: var(--muted);
        font-size: 14px;
        line-height: 1;
        padding: 0;
        cursor: pointer;
        flex-shrink: 0;
      }

      /* ── quick action toolbar (sits above the input bar) ── */
      .quick-toolbar {
        width: 520px;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 9px 14px;
        margin-bottom: 10px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(40px) saturate(180%);
        -webkit-backdrop-filter: blur(40px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow:
          0 12px 30px rgba(0, 0, 0, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);
        -webkit-app-region: no-drag;
        transition: opacity 240ms ease, transform 240ms ease;
      }

      .quick-toolbar .quick-btn {
        flex: 0 0 auto;
        height: 28px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--surface-soft);
        color: var(--ink);
        font-size: 12px;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
        transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
      }

      .quick-toolbar .quick-btn:hover {
        background: var(--accent-soft);
        border-color: var(--accent);
        color: var(--accent-strong);
      }

      .quick-toolbar .quick-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .quick-toolbar .quick-btn .quick-glyph {
        font-size: 13px;
        line-height: 1;
      }

      .quick-toolbar .quick-spacer {
        flex: 1 1 auto;
      }

      .quick-toolbar .quick-icon-btn {
        width: 30px;
        height: 30px;
        padding: 0;
        border-radius: 50%;
        display: grid;
        place-items: center;
        gap: 0;
      }

      /* ── inline form panel (scheduled task, voice prompt, etc.) ── */
      .inline-panel {
        width: 520px;
        margin-bottom: 8px;
        padding: 14px 16px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.97);
        backdrop-filter: blur(24px) saturate(1.2);
        -webkit-backdrop-filter: blur(24px) saturate(1.2);
        border: 1px solid rgba(255, 255, 255, 0.75);
        box-shadow:
          0 10px 28px rgba(0, 0, 0, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        -webkit-app-region: no-drag;
        display: none;
      }

      .inline-panel[data-open="true"] {
        display: block;
      }

      .inline-panel .panel-title {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 10px;
        color: var(--ink);
      }

      .inline-panel .panel-grid {
        display: grid;
        grid-template-columns: 88px 1fr;
        gap: 8px 10px;
        align-items: center;
        font-size: 12px;
      }

      .inline-panel label {
        color: var(--muted);
      }

      .inline-panel input[type="datetime-local"],
      .inline-panel input[type="text"],
      .inline-panel textarea {
        width: 100%;
        padding: 6px 10px;
        font-size: 12px;
        line-height: 1.45;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.96);
        color: var(--ink);
        font-family: inherit;
      }

      .inline-panel textarea {
        min-height: 48px;
        resize: vertical;
      }

      .inline-panel .panel-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 12px;
      }

      .inline-panel .panel-actions button {
        font-size: 12px;
        padding: 6px 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--surface-soft);
        color: var(--ink);
        cursor: pointer;
      }

      .inline-panel .panel-actions button.primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        color: #fff;
        border-color: transparent;
      }

      .inline-panel .panel-actions button:hover {
        filter: brightness(1.04);
      }

      .voice-status {
        font-size: 12px;
        color: var(--muted);
        margin-top: 8px;
        min-height: 16px;
      }

      .voice-status.recording {
        color: #dc2626;
        font-weight: 500;
      }

      .voice-status.recording::before {
        content: "● ";
        animation: pulse 1.2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.35; }
      }

      .quick-btn.recording {
        background: #fee2e2;
        border-color: #f87171;
        color: #b91c1c;
        animation: pulse 1.2s ease-in-out infinite;
      }

      /* ── input bar ── */
      .input-bar {
        width: 520px;
        display: flex;
        align-items: flex-end;
        gap: 8px;
        padding: 12px 16px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(40px) saturate(180%);
        -webkit-backdrop-filter: blur(40px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow:
          0 18px 48px rgba(0, 0, 0, 0.14),
          0 4px 16px rgba(0, 0, 0, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);
        -webkit-app-region: no-drag;
        transition: opacity 240ms ease, transform 240ms ease, box-shadow 240ms ease;
      }

      .input-bar textarea {
        flex: 1;
        border: none;
        background: transparent;
        padding: 4px 0;
        resize: none;
        font-size: 14px;
        line-height: 1.5;
        color: var(--ink);
        min-height: 24px;
        max-height: 96px;
        box-shadow: none;
      }

      .input-bar textarea:focus {
        outline: none;
        box-shadow: none;
        border: none;
      }

      .input-bar textarea::placeholder {
        color: var(--muted);
      }

      .input-bar .send-btn {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: none;
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        color: #fff;
        display: grid;
        place-items: center;
        padding: 0;
        flex-shrink: 0;
        box-shadow: 0 2px 8px rgba(99, 102, 241, 0.25);
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease;
      }

      .input-bar .send-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(99, 102, 241, 0.35);
      }

      .input-bar .send-btn svg {
        width: 16px;
        height: 16px;
        display: block;
      }

      .input-bar .send-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }

      .input-bar .aux-btn {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 1px solid var(--line);
        background: var(--surface-soft);
        color: var(--muted);
        display: grid;
        place-items: center;
        padding: 0;
        flex-shrink: 0;
        font-size: 14px;
      }

      .input-bar .aux-btn:hover {
        background: var(--surface-strong);
        color: var(--ink);
      }

      /* ── result notification toast ── */
      .result-toast {
        position: fixed;
        bottom: 90px;
        right: 24px;
        max-width: 320px;
        padding: 12px 16px;
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.97);
        backdrop-filter: blur(24px) saturate(1.2);
        -webkit-backdrop-filter: blur(24px) saturate(1.2);
        border: 1px solid rgba(255, 255, 255, 0.75);
        box-shadow:
          0 12px 36px rgba(0, 0, 0, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        cursor: pointer;
        animation: toast-in 240ms ease;
        -webkit-app-region: no-drag;
        display: none;
      }

      .result-toast.visible {
        display: block;
      }

      .result-toast .toast-title {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .result-toast .toast-body {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.45;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .result-toast .toast-actions {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }

      .result-toast .toast-actions button {
        font-size: 11px;
        padding: 4px 10px;
      }

      @keyframes bubble-in {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes toast-in {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ─────────────────────────────────────────────────────────────
         APPLE-STYLE VOICE CARD (Siri-like waveform)
         ───────────────────────────────────────────────────────────── */
      .voice-card {
        display: none;
        width: 460px;
        padding: 26px 28px 22px;
        margin-bottom: 12px;
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(40px) saturate(180%);
        -webkit-backdrop-filter: blur(40px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.55);
        box-shadow:
          0 30px 70px rgba(0, 0, 0, 0.18),
          0 6px 20px rgba(0, 0, 0, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);
        -webkit-app-region: no-drag;
        text-align: center;
        animation: voice-in 320ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      body.voice-mode .voice-card {
        display: block;
      }

      .voice-card .voice-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--ink);
        letter-spacing: 0.01em;
      }

      .voice-card .voice-subtitle {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }

      .wave-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        height: 64px;
        margin: 18px 0 8px;
      }

      .wave-bar {
        width: 5px;
        height: 14px;
        border-radius: 999px;
        background: linear-gradient(180deg, #6366f1, #8b5cf6);
        opacity: 0.85;
        transform-origin: center;
        animation: wave-pulse 1.1s ease-in-out infinite;
      }

      .wave-bar:nth-child(1) { animation-delay: 0ms;   }
      .wave-bar:nth-child(2) { animation-delay: 90ms;  }
      .wave-bar:nth-child(3) { animation-delay: 180ms; }
      .wave-bar:nth-child(4) { animation-delay: 270ms; }
      .wave-bar:nth-child(5) { animation-delay: 360ms; }
      .wave-bar:nth-child(6) { animation-delay: 270ms; }
      .wave-bar:nth-child(7) { animation-delay: 180ms; }
      .wave-bar:nth-child(8) { animation-delay: 90ms;  }
      .wave-bar:nth-child(9) { animation-delay: 0ms;   }

      .voice-card.idle .wave-bar {
        animation-play-state: paused;
        opacity: 0.35;
        transform: scaleY(0.5);
      }

      .voice-card.error .wave-bar {
        background: linear-gradient(180deg, #f87171, #dc2626);
        animation-play-state: paused;
        transform: scaleY(0.6);
      }

      @keyframes wave-pulse {
        0%, 100% { transform: scaleY(0.4); opacity: 0.55; }
        50%      { transform: scaleY(2.6); opacity: 1; }
      }

      .voice-card .voice-transcript {
        min-height: 28px;
        padding: 8px 14px;
        margin: 4px auto 0;
        max-width: 380px;
        font-size: 14px;
        line-height: 1.5;
        color: var(--ink);
        background: rgba(99, 102, 241, 0.06);
        border-radius: 14px;
        word-break: break-word;
      }

      .voice-card .voice-hint {
        font-size: 11px;
        color: var(--muted);
        margin-top: 12px;
      }

      .voice-card .voice-actions {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 14px;
      }

      .voice-card .voice-actions button {
        font-size: 12px;
        padding: 7px 18px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--surface-soft);
        color: var(--ink);
        cursor: pointer;
        transition: background 120ms ease, transform 120ms ease;
      }

      .voice-card .voice-actions button.primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        color: #fff;
        border-color: transparent;
      }

      .voice-card .voice-actions button:hover {
        transform: translateY(-1px);
      }

      @keyframes voice-in {
        from { opacity: 0; transform: translateY(20px) scale(0.96); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* ─────────────────────────────────────────────────────────────
         POP BUBBLE — minimal, ephemeral feedback
         ───────────────────────────────────────────────────────────── */
      .pop-bubble {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        max-width: 480px;
        padding: 14px 20px;
        border-radius: 22px;
        background: rgba(28, 28, 30, 0.92);
        color: rgba(255, 255, 255, 0.96);
        font-size: 14px;
        line-height: 1.5;
        box-shadow:
          0 20px 50px rgba(0, 0, 0, 0.28),
          0 4px 16px rgba(0, 0, 0, 0.12);
        backdrop-filter: blur(32px) saturate(180%);
        -webkit-backdrop-filter: blur(32px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        opacity: 0;
        pointer-events: none;
        transition: opacity 260ms ease, transform 260ms cubic-bezier(0.22, 1, 0.36, 1);
        word-break: break-word;
      }

      .pop-bubble[data-open="true"] {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
        pointer-events: auto;
      }

      .pop-bubble .pop-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: rgba(255, 255, 255, 0.55);
        margin-bottom: 4px;
      }

      .pop-bubble .pop-body {
        font-size: 13px;
        line-height: 1.6;
        max-height: 220px;
        overflow-y: auto;
      }

      .pop-bubble .pop-actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .pop-bubble .pop-actions button {
        font-size: 11px;
        padding: 5px 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.92);
        cursor: pointer;
      }

      .pop-bubble .pop-actions button:hover {
        background: rgba(255, 255, 255, 0.16);
      }
    </style>
  </head>
  <body>
    <!-- Bubble conversation area -->
    <div id="bubbleArea" class="bubble-area" hidden></div>

    <!-- Inline schedule form (hidden by default) -->
    <div id="schedulePanel" class="inline-panel" data-open="false">
      <div class="panel-title">新建定时任务</div>
      <div class="panel-grid">
        <label for="scheduleWhen">触发时间</label>
        <input id="scheduleWhen" type="datetime-local">
        <label for="scheduleName">任务名称</label>
        <input id="scheduleName" type="text" placeholder="例如：每日翻译播报">
        <label for="scheduleCommand">任务内容</label>
        <textarea id="scheduleCommand" rows="2" placeholder="例如：翻译我剪贴板里的内容并通知我"></textarea>
      </div>
      <div class="panel-actions">
        <button id="scheduleCancelBtn" type="button">取消</button>
        <button id="scheduleSaveBtn" type="button" class="primary">创建</button>
      </div>
    </div>

    <!-- Apple-style voice card (replaces the old inline panel) -->
    <div id="voiceCard" class="voice-card idle">
      <div class="voice-title">语音输入</div>
      <div class="voice-subtitle" id="voiceStatus">点击「开始」后说话</div>
      <div class="wave-container" aria-hidden="true">
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
      </div>
      <div id="voiceTranscript" class="voice-transcript">&nbsp;</div>
      <div class="voice-hint">回车发送 · Esc 取消 · 自动停止后等待新指令</div>
      <select id="voiceLang" style="margin-top:10px;padding:6px 10px;font-size:12px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,0.92);">
        <option value="zh-CN" selected>中文（普通话）</option>
        <option value="en-US">English (US)</option>
        <option value="ja-JP">日本語</option>
        <option value="ko-KR">한국어</option>
      </select>
      <div class="voice-actions">
        <button id="voiceCancelBtn" type="button">取消</button>
        <button id="voiceStopBtn" type="button">停止</button>
        <button id="voiceStartBtn" type="button" class="primary">开始</button>
      </div>
    </div>

    <!-- Quick action toolbar -->
    <div class="quick-toolbar">
      <button id="newSessionBtn" class="quick-btn" type="button" title="开始新会话（清空记忆）">
        <span class="quick-glyph">&#10133;</span>新会话
      </button>
      <button class="quick-btn" data-quick-action="translate" type="button" title="翻译当前上下文">
        <span class="quick-glyph">&#127760;</span>翻译
      </button>
      <button class="quick-btn" data-quick-action="summarize" type="button" title="总结当前上下文">
        <span class="quick-glyph">&#128221;</span>总结
      </button>
      <button class="quick-btn" data-quick-action="explain" type="button" title="解释当前上下文">
        <span class="quick-glyph">&#128161;</span>解释
      </button>
      <button id="scheduleToggleBtn" class="quick-btn" type="button" title="新建定时任务">
        <span class="quick-glyph">&#9200;</span>定时
      </button>
      <button id="voiceToggleBtn" class="quick-btn" type="button" title="语音输入 (Ctrl+Shift+V)">
        <span class="quick-glyph">&#127908;</span>语音
      </button>
      <span class="quick-spacer"></span>
      <button id="settingsBtn" class="quick-btn quick-icon-btn" type="button" title="打开设置">
        <span class="quick-glyph">&#9881;</span>
      </button>
    </div>

    <!-- Bottom input bar -->
    <div class="input-bar">
      <button id="clipboardBtn" class="aux-btn" type="button" title="读取剪贴板">&#128203;</button>
      <textarea id="commandInput" rows="1" placeholder="输入你的需求..." autofocus></textarea>
      <button id="sendBtn" class="send-btn" type="button" title="发送 (Enter)">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M3.4 20.4l17.45-8.05a.5.5 0 0 0 0-.91L3.4 3.4a.5.5 0 0 0-.7.6l2.4 7.5a.5.5 0 0 0 .42.34l9.48.9a.1.1 0 0 1 0 .2l-9.48.9a.5.5 0 0 0-.42.34L2.7 19.8a.5.5 0 0 0 .7.6z" fill="currentColor"/>
        </svg>
      </button>
      <button id="closeBtn" class="aux-btn" type="button" title="关闭">&#10005;</button>
    </div>

    <!-- Apple-style ephemeral pop bubble (centered) -->
    <div id="popBubble" class="pop-bubble" data-open="false">
      <div class="pop-label" id="popLabel">UCA</div>
      <div class="pop-body" id="popBody"></div>
      <div class="pop-actions">
        <button id="popOpenBtn" type="button">展开对话</button>
        <button id="popCopyBtn" type="button">复制</button>
      </div>
    </div>

    <!-- Result toast (bottom-right) -->
    <div id="resultToast" class="result-toast">
      <div id="toastTitle" class="toast-title"></div>
      <div id="toastBody" class="toast-body"></div>
      <div class="toast-actions">
        <button id="toastOpenBtn" class="primary" type="button">打开结果</button>
        <button id="toastCopyBtn" class="secondary" type="button">复制</button>
        <button id="toastContinueBtn" class="ghost" type="button">继续追问</button>
      </div>
    </div>

    <script type="module" src="./overlay.js"></script>
  </body>
</html>
