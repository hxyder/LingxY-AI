      </div>
      <div class="panel-actions">
        <button id="scheduleCancelBtn" type="button">取消</button>
        <button id="scheduleSaveBtn" type="button" class="primary">创建</button>
      </div>
    </div>

    <!-- Apple-style voice card. This surface focuses on recording notes; the
         composer mic button owns lightweight voice-to-text. Legacy voice-input
         controls remain in DOM as a hidden fallback for older state restore. -->
    <div id="voiceCard" class="voice-card idle" data-mode="note" role="dialog" aria-label="录音笔记与语音输入" aria-modal="false">
      <button id="voiceMinimizeBtn" class="voice-minimize" type="button" title="最小化" aria-label="最小化录音面板">−</button>
      <!-- Tab switcher kept for verifier + legacy fallback; visually hidden
           because the composer mic now owns voice-input. -->
      <div class="note-mode-tabs" hidden>
        <button class="note-tab-btn" id="tabVoiceBtn" type="button">语音输入</button>
        <button class="note-tab-btn active" id="tabNoteBtn" type="button">录音笔记</button>
      </div>

      <div class="voice-title note-only">录音笔记 · 实时转录</div>

      <!-- Voice-card dropzone: files/images dropped anywhere on the card are
           attached as context; the user can then speak the instruction. -->
      <div id="voiceDropHint" class="voice-drop-hint" aria-hidden="true">拖入文件 / 图片作为上下文</div>
      <div id="voiceChips" class="voice-chips voice-only" role="list" aria-label="已附加的文件"></div>

      <!-- ── VOICE mode elements (legacy fallback, hidden in note mode) ── -->
      <div class="voice-subtitle voice-only" id="voiceStatus" role="status" aria-live="polite">点击发送旁的麦克风可直接语音输入；本面板用于录音笔记</div>
      <div class="wave-container voice-only" aria-hidden="true">
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
      </div>
      <div id="voiceTranscript" class="voice-transcript voice-only placeholder" role="status" aria-live="polite" aria-label="实时语音识别文本">实时识别的文字会显示在这里…</div>
      <div class="voice-hint voice-only">回车发送 · Esc 取消 · 自动停止后等待新指令</div>
      <select id="voiceLang" class="voice-only" aria-label="语音输入语言" style="margin-top:10px;padding:6px 10px;font-size:12px;border-radius:10px;border:1px solid var(--glass-line);background:var(--glass-surface);color:var(--glass-ink);">
        <option value="zh-CN" selected>中文（普通话，保留英文词）</option>
        <option value="auto">自动识别语言 / Mixed</option>
        <option value="en-US">English (US)</option>
        <option value="ja-JP">日本語</option>
        <option value="ko-KR">한국어</option>
      </select>
      <div class="voice-actions voice-only">
        <button id="voiceCancelBtn" type="button">取消</button>
        <button id="voiceStopBtn" type="button">停止</button>
        <button id="voiceStartBtn" type="button" class="primary">开始</button>
      </div>

      <!-- ── NOTE mode elements ── -->
      <div class="note-header note-only">
        <span class="note-label">记录会话中</span>
        <span class="note-timer" id="noteTimer">00:00</span>
      </div>
      <div class="note-channels note-only">
        <span class="note-channel-tag" id="noteMicTag"><span class="dot"></span>输入音频（麦克风）</span>
        <span class="note-channel-tag" id="noteSysTag"><span class="dot"></span>输出音频（系统）</span>
      </div>
      <div class="note-transcript-box note-only" id="noteTranscriptBox" role="log" aria-live="polite" aria-label="录音笔记实时转录"></div>
      <div class="note-hint note-only">输入音频实时转录 · 输出音频录制后统一处理</div>
      <select id="noteLang" class="note-only" aria-label="录音笔记语言" style="margin-top:8px;padding:6px 10px;font-size:12px;border-radius:10px;border:1px solid var(--glass-line);background:var(--glass-surface);color:var(--glass-ink);">
        <option value="auto" selected>自动识别语言</option>
        <option value="zh-CN">中文（普通话）</option>
        <option value="en-US">English (US)</option>
        <option value="ja-JP">日本語</option>
        <option value="ko-KR">한국어</option>
      </select>
      <div class="voice-actions note-only">
        <button id="noteCancelBtn" type="button">取消</button>
        <button id="noteFinishBtn" type="button" class="primary">完成笔记</button>
      </div>
    </div>

    <!-- Quick action toolbar -->
    <div class="quick-toolbar" role="toolbar" aria-label="快捷操作">
      <button id="newSessionBtn" class="quick-btn" type="button" title="开始新会话（清空记忆）" aria-label="开始新会话">
        <span class="quick-glyph">&#10133;</span>新会话
      </button>
      <button id="projectSelectorBtn" class="quick-btn" type="button" title="切换项目 / 查看历史会话" aria-label="切换项目或查看历史会话">
        <span class="quick-glyph">&#128218;</span>对话
      </button>
      <button class="quick-btn" data-quick-action="translate" type="button" title="翻译当前上下文" aria-label="翻译当前上下文">
        <span class="quick-glyph">&#127760;</span>翻译
      </button>
      <button class="quick-btn" data-quick-action="summarize" type="button" title="总结当前上下文" aria-label="总结当前上下文">
        <span class="quick-glyph">&#128221;</span>总结
      </button>
      <button class="quick-btn" data-quick-action="explain" type="button" title="解释当前上下文" aria-label="解释当前上下文">
        <span class="quick-glyph">&#128161;</span>解释
      </button>
      <button id="scheduleToggleBtn" class="quick-btn" type="button" title="新建定时任务" aria-label="新建定时任务">
        <span class="quick-glyph">&#9200;</span>定时
      </button>
      <button id="voiceToggleBtn" class="quick-btn" type="button" title="录音笔记 (Ctrl+Shift+N) — 语音输入请用发送旁的麦克风按钮 (Ctrl+Shift+V)" aria-label="打开录音笔记">
        <span class="quick-glyph">&#127908;</span>录音笔记
      </button>
      <span class="quick-spacer"></span>
      <button id="settingsBtn" class="quick-btn quick-icon-btn" type="button" title="打开设置" aria-label="打开设置">
        <span class="quick-glyph">&#9881;</span>
      </button>
    </div>

    <!-- Bottom input bar -->
    <div class="input-bar" role="group" aria-label="指令输入栏">
      <button id="clipboardBtn" class="aux-btn" type="button" title="读取剪贴板" aria-label="读取剪贴板内容作为上下文">&#128203;</button>
      <textarea id="commandInput" rows="1" placeholder="输入你的需求..." aria-label="输入指令（按 Enter 发送，Shift+Enter 换行）" autofocus></textarea>
      <button id="composerMicBtn" class="aux-btn composer-mic-btn" type="button" title="语音输入 (Ctrl+Shift+V) — 再次点击停止" aria-label="语音输入" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z" fill="currentColor"/>
          <path d="M5 11a7 7 0 0 0 14 0M12 18v3M9 21h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </button>
      <button id="sendBtn" class="send-btn" type="button" title="发送 (Enter)" aria-label="发送指令">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M3.4 20.4l17.45-8.05a.5.5 0 0 0 0-.91L3.4 3.4a.5.5 0 0 0-.7.6l2.4 7.5a.5.5 0 0 0 .42.34l9.48.9a.1.1 0 0 1 0 .2l-9.48.9a.5.5 0 0 0-.42.34L2.7 19.8a.5.5 0 0 0 .7.6z" fill="currentColor"/>
        </svg>
      </button>
      <button id="closeBtn" class="aux-btn" type="button" title="关闭" aria-label="关闭浮层">&#10005;</button>
    </div>

    <!-- Apple-style ephemeral pop bubble (centered) -->
    <div id="popBubble" class="pop-bubble" data-open="false" role="status" aria-live="polite">
      <div class="pop-label" id="popLabel">UCA</div>
      <div class="pop-body" id="popBody"></div>
      <div class="pop-actions">
        <button id="popOpenBtn" type="button">展开对话</button>
        <button id="popCopyBtn" type="button">复制</button>
      </div>
    </div>

    <!-- UCA-182 Phase 8: result-toast retired. Artifact notifications
         now go through the top-right popup-card stack (see
         popup-card-manager.mjs / popup-card.js). -->

    <!-- Task list dock (bottom-right) -->
    <button id="taskListDock" class="task-list-dock" type="button" title="任务清单" aria-label="打开任务清单" aria-haspopup="true" aria-expanded="false">
      <span aria-hidden="true">📋</span>
      <span id="taskListDockBadge" class="dock-badge" hidden>0</span>
    </button>
    <div id="taskListPanel" class="task-list-panel" data-open="false" role="dialog" aria-label="任务清单" aria-modal="false">
      <div class="task-list-header">
        <strong style="font-size:12px;">任务清单</strong>
        <button id="taskListCloseBtn" class="aux-btn" type="button" style="width:22px;height:22px;" aria-label="关闭任务清单">×</button>
      </div>
      <div class="task-list-filters" role="tablist" aria-label="任务过滤">
        <button type="button" data-task-filter="all" class="active" role="tab" aria-selected="true">全部</button>
        <button type="button" data-task-filter="active" role="tab" aria-selected="false">进行中</button>
        <button type="button" data-task-filter="done" role="tab" aria-selected="false">已完成</button>
      </div>
      <div id="taskListBody" class="task-list-body" role="list"></div>
    </div>

    <div id="overlayResizeGrip" class="window-resize-grip" title="调整对话框大小" aria-label="调整对话框大小"></div>

    <script src="./drop-guard.js"></script>
    <script src="./preview/client-registry.js"></script>
    <script src="./preview/handlers/iframe-remote.js"></script>
    <script src="./preview/handlers/text.js"></script>
    <script src="./preview/handlers/csv.js"></script>
    <script src="./preview/handlers/image.js"></script>
    <script src="./preview/handlers/pdf.js"></script>
    <script src="./preview/streaming.js"></script>
    <script src="./live-preview-shell-client.js"></script>
    <script src="./live-preview.js"></script>
    <script type="module" src="./overlay.js"></script>
  </body>
</html>
