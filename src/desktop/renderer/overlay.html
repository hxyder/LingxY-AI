<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UCA</title>
    <link rel="stylesheet" href="./shared.css">
    <style>
      html, body {
        height: 100%;
        background: transparent;
        overflow: hidden;
      }

      body {
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        padding: 0 0 24px;
        font-family: -apple-system, "SF Pro Text", "SF Pro Display", "Segoe UI Variable Text", "Segoe UI", "PingFang SC", "Microsoft YaHei UI", system-ui, sans-serif;
        /* transparent window — no drag region needed */
      }

      /* Apple-style auto-hide: when overlay is "popping" (no user engagement)
         the chrome subtly fades out, then JS hides the window. */
      body.popping .quick-toolbar,
      body.popping .input-bar {
        opacity: 0;
        transform: translateY(8px);
        pointer-events: none;
        transition: opacity 280ms ease, transform 280ms ease;
      }

      body.popping .bubble-area {
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 280ms ease, transform 280ms ease;
      }

      body.voice-mode .quick-toolbar,
      body.voice-mode .input-bar,
      body.voice-mode .bubble-area,
      body.voice-mode #schedulePanel {
        display: none !important;
      }

      /* ── bubble conversation area ── */
      .bubble-area {
        width: var(--overlay-width);
        max-height: 420px;
        overflow-y: auto;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 14px 18px;
        margin-bottom: 10px;
        border-radius: 22px 22px 8px 8px;
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(40px) saturate(180%);
        -webkit-backdrop-filter: blur(40px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow:
          0 24px 60px rgba(0, 0, 0, 0.14),
          0 4px 16px rgba(0, 0, 0, 0.05),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);
        -webkit-app-region: no-drag;
        scrollbar-width: thin;
        scrollbar-color: rgba(0,0,0,0.12) transparent;
        transition: opacity 240ms ease, transform 240ms ease;
      }

      .bubble-area:empty,
      .bubble-area[hidden] {
        display: none;
      }

      /* ── empty state (shown when no bubbles yet) ── */
      .empty-state {
        width: var(--overlay-width);
        margin-bottom: 10px;
        padding: 22px 22px 18px;
        border-radius: 22px 22px 8px 8px;
        background: rgba(255, 255, 255, 0.66);
        backdrop-filter: blur(30px) saturate(160%);
        -webkit-backdrop-filter: blur(30px) saturate(160%);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        text-align: center;
        -webkit-app-region: no-drag;
        transition: opacity 200ms ease;
      }
      .empty-state[aria-hidden="true"] {
        display: none;
      }
      body.voice-mode .empty-state {
        display: none !important;
      }
      .empty-state-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--ink);
        margin-bottom: 4px;
      }
      .empty-state-hint {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 14px;
      }
      .empty-state-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        justify-content: center;
        margin-bottom: 12px;
      }
      .empty-state .empty-chip {
        font-size: 12px;
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.7);
        color: var(--ink);
        cursor: pointer;
        transition: background 140ms ease, transform 80ms ease;
      }
      .empty-state .empty-chip:hover {
        background: rgba(99, 102, 241, 0.1);
        transform: translateY(-1px);
      }
      .empty-state-footnote {
        font-size: 11px;
        color: var(--muted);
        opacity: 0.8;
      }
      body[data-theme="dark"] .empty-state {
        background: rgba(30, 30, 36, 0.78);
        border-color: rgba(255, 255, 255, 0.08);
      }
      body[data-theme="dark"] .empty-state .empty-chip {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.12);
        color: #e8e8e8;
      }

      /* ── bubbles ── */
      .bubble {
        max-width: 85%;
        padding: 10px 14px;
        border-radius: 14px;
        font-size: 13px;
        line-height: 1.55;
        word-break: break-word;
        animation: bubble-in 180ms ease;
      }

      .bubble.assistant {
        align-self: flex-start;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid var(--line);
        border-bottom-left-radius: 4px;
        box-shadow: var(--shadow-sm);
      }

      .bubble.assistant.streaming {
        border-color: rgba(99, 102, 241, 0.35);
        background: rgba(245, 246, 255, 0.95);
        animation: streamPulse 1.8s ease-in-out infinite;
      }
      @keyframes streamPulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); }
        50% { box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
      }

      .bubble.user {
        align-self: flex-end;
        background: var(--accent);
        color: #fff;
        border-bottom-right-radius: 4px;
        box-shadow: 0 2px 8px rgba(99, 102, 241, 0.2);
      }

      .bubble.system {
        align-self: center;
        max-width: 100%;
        font-size: 11px;
        color: var(--muted);
        background: rgba(107, 114, 128, 0.06);
        border-radius: 8px;
        padding: 6px 12px;
      }

      .bubble.step {
        align-self: flex-start;
        max-width: 90%;
        font-size: 12px;
        color: var(--muted);
        background: rgba(107, 114, 128, 0.05);
        border-radius: 8px;
        padding: 5px 10px 5px 10px;
        border-left: 2px solid rgba(107, 114, 128, 0.2);
        display: flex;
        flex-direction: column;
        gap: 2px;
        animation: none;
      }
      .bubble.step.pending {
        border-left-color: rgba(99, 102, 241, 0.5);
        color: rgba(99, 102, 241, 0.85);
      }
      .bubble.step.done {
        border-left-color: rgba(34, 197, 94, 0.7);
      }
      .bubble.step.fail {
        border-left-color: rgba(239, 68, 68, 0.6);
        color: rgba(239, 68, 68, 0.8);
      }

      .child-badge-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 6px;
      }

      .child-badge-row button {
        border: 1px solid var(--line);
        background: var(--surface-strong);
        color: var(--ink);
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 8px;
        cursor: pointer;
      }

      .child-badge-row button.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      /* ── inline option buttons inside bubbles ── */
      .bubble-options {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }

      .bubble-options button {
        font-size: 12px;
        padding: 5px 12px;
        border-radius: var(--radius-pill);
        background: var(--surface-strong);
        border: 1px solid var(--line);
        color: var(--ink);
        font-weight: 500;
      }

      .bubble-options button:hover {
        background: var(--accent-soft);
        border-color: var(--accent);
        color: var(--accent-strong);
      }

      .bubble-options button.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      /* ── context chips (attached files / web context) ── */
      .context-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        border-radius: var(--radius-pill);
        font-size: 12px;
        background: rgba(99, 102, 241, 0.08);
        border: 1px solid rgba(99, 102, 241, 0.15);
        color: var(--accent-strong);
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .context-chip .dismiss {
        width: 14px;
        height: 14px;
        border: none;
        background: none;
        color: var(--muted);
        font-size: 14px;
        line-height: 1;
        padding: 0;
        cursor: pointer;
        flex-shrink: 0;
      }

      /* ── quick action toolbar (sits above the input bar) ── */
      .quick-toolbar {
        width: var(--overlay-width);
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 9px 14px;
        margin-bottom: 10px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(40px) saturate(180%);
        -webkit-backdrop-filter: blur(40px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow:
          0 12px 30px rgba(0, 0, 0, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);
        -webkit-app-region: no-drag;
        transition: opacity 240ms ease, transform 240ms ease;
      }

      .quick-toolbar .quick-btn {
        flex: 0 0 auto;
        height: 28px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--surface-soft);
        color: var(--ink);
        font-size: 12px;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
        transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
      }

      .quick-toolbar .quick-btn:hover {
        background: var(--accent-soft);
        border-color: var(--accent);
        color: var(--accent-strong);
      }

      .quick-toolbar .quick-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .quick-toolbar .quick-btn .quick-glyph {
        font-size: 13px;
        line-height: 1;
      }

      .quick-toolbar .quick-spacer {
        flex: 1 1 auto;
      }

      .quick-toolbar .quick-icon-btn {
        width: 30px;
        height: 30px;
        padding: 0;
        border-radius: 50%;
        display: grid;
        place-items: center;
        gap: 0;
      }

      /* ── inline form panel (scheduled task, voice prompt, etc.) ── */
      .inline-panel {
        width: var(--overlay-width);
        margin-bottom: 8px;
        padding: 14px 16px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.97);
        backdrop-filter: blur(24px) saturate(1.2);
        -webkit-backdrop-filter: blur(24px) saturate(1.2);
        border: 1px solid rgba(255, 255, 255, 0.75);
        box-shadow:
          0 10px 28px rgba(0, 0, 0, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        -webkit-app-region: no-drag;
        display: none;
      }

      .inline-panel[data-open="true"] {
        display: block;
      }

      .inline-panel .panel-title {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 10px;
        color: var(--ink);
      }

      .inline-panel .panel-grid {
        display: grid;
        grid-template-columns: 88px 1fr;
        gap: 8px 10px;
        align-items: center;
        font-size: 12px;
      }

      .inline-panel label {
        color: var(--muted);
      }

      .inline-panel input[type="datetime-local"],
      .inline-panel input[type="text"],
      .inline-panel textarea {
        width: 100%;
        padding: 6px 10px;
        font-size: 12px;
        line-height: 1.45;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.96);
        color: var(--ink);
        font-family: inherit;
      }

      .inline-panel textarea {
        min-height: 48px;
        resize: vertical;
      }

      .inline-panel .panel-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 12px;
      }

      .inline-panel .panel-actions button {
        font-size: 12px;
        padding: 6px 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--surface-soft);
        color: var(--ink);
        cursor: pointer;
      }

      .inline-panel .panel-actions button.primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        color: #fff;
        border-color: transparent;
      }

      .inline-panel .panel-actions button:hover {
        filter: brightness(1.04);
      }

      .voice-status {
        font-size: 12px;
        color: var(--muted);
        margin-top: 8px;
        min-height: 16px;
      }

      .voice-status.recording {
        color: #dc2626;
        font-weight: 500;
      }

      .voice-status.recording::before {
        content: "● ";
        animation: pulse 1.2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0.35; }
      }

      .quick-btn.sync-offline {
        position: relative;
      }
      .quick-btn.sync-offline::after {
        content: "";
        position: absolute;
        top: 4px;
        right: 4px;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #ef4444;
        box-shadow: 0 0 0 2px var(--surface, #fff);
        pointer-events: none;
      }

      .quick-btn.recording {
        background: #fee2e2;
        border-color: #f87171;
        color: #b91c1c;
        animation: pulse 1.2s ease-in-out infinite;
      }

      /* ── input bar ── */
      .input-bar {
        width: var(--overlay-width);
        display: flex;
        align-items: flex-end;
        gap: 8px;
        padding: 12px 16px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(40px) saturate(180%);
        -webkit-backdrop-filter: blur(40px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow:
          0 18px 48px rgba(0, 0, 0, 0.14),
          0 4px 16px rgba(0, 0, 0, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);
        -webkit-app-region: no-drag;
        transition: opacity 240ms ease, transform 240ms ease, box-shadow 240ms ease;
      }

      .input-bar textarea {
        flex: 1;
        border: none;
        background: transparent;
        padding: 4px 0;
        resize: none;
        font-size: 14px;
        line-height: 1.5;
        color: var(--ink);
        min-height: 24px;
        max-height: 96px;
        box-shadow: none;
      }

      .input-bar textarea:focus {
        outline: none;
        box-shadow: none;
        border: none;
      }

      .input-bar textarea::placeholder {
        color: var(--muted);
      }

      .input-bar .send-btn {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: none;
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        color: #fff;
        display: grid;
        place-items: center;
        padding: 0;
        flex-shrink: 0;
        box-shadow: 0 2px 8px rgba(99, 102, 241, 0.25);
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease;
      }

      .input-bar .send-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(99, 102, 241, 0.35);
      }

      .input-bar .send-btn svg {
        width: 16px;
        height: 16px;
        display: block;
      }

      .input-bar .send-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }

      body.send-busy .input-bar .send-btn {
        opacity: 0.85;
        animation: send-btn-pulse 1.2s ease-in-out infinite;
      }

      @keyframes send-btn-pulse {
        0%, 100% { opacity: 0.55; }
        50%      { opacity: 1;    }
      }

      .input-bar .aux-btn {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 1px solid var(--line);
        background: var(--surface-soft);
        color: var(--muted);
        display: grid;
        place-items: center;
        padding: 0;
        flex-shrink: 0;
        font-size: 14px;
      }

      .input-bar .aux-btn:hover {
        background: var(--surface-strong);
        color: var(--ink);
      }

      /* ── result notification toast ── */
      .result-toast {
        position: fixed;
        top: auto;
        bottom: 70px;
        left: 50%;
        transform: translateX(-50%);
        max-width: 340px;
        width: max-content;
        padding: 12px 16px;
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.97);
        backdrop-filter: blur(24px) saturate(1.2);
        -webkit-backdrop-filter: blur(24px) saturate(1.2);
        border: 1px solid rgba(255, 255, 255, 0.75);
        box-shadow:
          0 12px 36px rgba(0, 0, 0, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        cursor: pointer;
        animation: toast-in 240ms ease;
        -webkit-app-region: no-drag;
        display: none;
      }

      .result-toast.visible {
        display: block;
      }

      .result-toast .toast-title {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .result-toast .toast-body {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.45;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .result-toast .toast-actions {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }

      .result-toast .toast-actions button {
        font-size: 11px;
        padding: 4px 10px;
      }

      /* ── task list dock ── */
      .task-list-dock {
        position: fixed;
        right: 22px;
        bottom: 30px;
        width: 26px;
        height: 26px;
        padding: 0;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.6);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
        cursor: pointer;
        font: inherit;
        color: inherit;
        z-index: 20;
      }
      .task-list-dock:focus-visible {
        outline: 2px solid #6366f1;
        outline-offset: 2px;
      }

      .task-list-dock .dock-badge {
        position: absolute;
        top: -6px;
        right: -6px;
        min-width: 16px;
        height: 16px;
        border-radius: 999px;
        background: #ef4444;
        color: #fff;
        font-size: 10px;
        display: grid;
        place-items: center;
        padding: 0 4px;
        border: 2px solid rgba(255, 255, 255, 0.9);
      }

      .task-list-panel {
        position: fixed;
        right: 22px;
        bottom: 70px;
        width: 300px;
        max-height: 360px;
        background: rgba(255, 255, 255, 0.97);
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 16px;
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.16);
        padding: 12px;
        display: none;
        flex-direction: column;
        gap: 8px;
        z-index: 20;
      }

      .task-list-panel[data-open="true"] {
        display: flex;
      }

      .task-list-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .task-list-filters {
        display: flex;
        gap: 6px;
      }

      .task-list-filters button {
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--surface-strong);
        cursor: pointer;
      }

      .task-list-filters button.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .task-list-body {
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .task-list-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: var(--surface-strong);
      }

      .task-progress-ring {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 2px solid rgba(59, 130, 246, 0.2);
        display: grid;
        place-items: center;
        font-size: 9px;
        color: var(--muted);
      }

      @keyframes bubble-in {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes toast-in {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ─────────────────────────────────────────────────────────────
         APPLE-STYLE VOICE CARD (Siri-like waveform)
         ───────────────────────────────────────────────────────────── */
      .voice-card {
        display: none;
        position: relative;
        width: var(--overlay-width);
        padding: 26px 28px 22px;
        margin-bottom: 12px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(40px) saturate(180%);
        -webkit-backdrop-filter: blur(40px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.55);
        box-shadow:
          0 30px 70px rgba(0, 0, 0, 0.18),
          0 6px 20px rgba(0, 0, 0, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);
        -webkit-app-region: no-drag;
        text-align: center;
        animation: voice-in 320ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      body.voice-mode .voice-card {
        display: block;
      }

      .voice-card .voice-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--ink);
        letter-spacing: 0.01em;
      }

      .voice-card .voice-minimize {
        position: absolute;
        top: 14px;
        right: 16px;
        width: 28px;
        height: 28px;
        border: 1px solid rgba(0,0,0,0.08);
        border-radius: 999px;
        background: rgba(255,255,255,0.58);
        color: var(--muted);
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
        display: grid;
        place-items: center;
        transition: transform 120ms ease, background 120ms ease, color 120ms ease;
      }

      .voice-card .voice-minimize:hover {
        transform: translateY(-1px);
        background: rgba(255,255,255,0.82);
        color: var(--ink);
      }

      .voice-card .voice-subtitle {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }

      .wave-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        height: 64px;
        margin: 18px 0 8px;
      }

      .wave-bar {
        width: 5px;
        height: 14px;
        border-radius: 999px;
        background: #000000;
        opacity: 0.85;
        transform-origin: center;
        animation: wave-pulse 1.1s ease-in-out infinite;
      }

      .wave-bar:nth-child(1) { animation-delay: 0ms;   }
      .wave-bar:nth-child(2) { animation-delay: 90ms;  }
      .wave-bar:nth-child(3) { animation-delay: 180ms; }
      .wave-bar:nth-child(4) { animation-delay: 270ms; }
      .wave-bar:nth-child(5) { animation-delay: 360ms; }
      .wave-bar:nth-child(6) { animation-delay: 270ms; }
      .wave-bar:nth-child(7) { animation-delay: 180ms; }
      .wave-bar:nth-child(8) { animation-delay: 90ms;  }
      .wave-bar:nth-child(9) { animation-delay: 0ms;   }

      /* When JS audio meter is active, it writes transform: scaleY(...) on
         each bar directly. Suspend the CSS keyframe animation so the bars
         respond to actual mic input instead of fighting a fixed-period
         pulse. */
      .voice-card.audio-reactive .wave-bar {
        animation: none;
        transform-origin: center;
        transition: transform 60ms ease-out, opacity 120ms ease-out;
      }

      .voice-card.idle .wave-bar {
        animation-play-state: paused;
        opacity: 0.35;
        transform: scaleY(0.5);
      }

      .voice-card.error .wave-bar {
        background: linear-gradient(180deg, #f87171, #dc2626);
        animation-play-state: paused;
        transform: scaleY(0.6);
      }

      @keyframes wave-pulse {
        0%, 100% { transform: scaleY(0.4); opacity: 0.55; }
        50%      { transform: scaleY(2.6); opacity: 1; }
      }

      .voice-card .voice-transcript {
        min-height: 56px;
        max-height: 180px;
        overflow-y: auto;
        padding: 12px 16px;
        margin: 8px auto 0;
        max-width: 420px;
        font-size: 15px;
        line-height: 1.55;
        color: var(--ink);
        background: rgba(99, 102, 241, 0.08);
        border: 1px solid rgba(99, 102, 241, 0.18);
        border-radius: 14px;
        word-break: break-word;
        scroll-behavior: smooth;
        text-align: left;
        transition: border-color 0.2s ease, background 0.2s ease;
      }
      .voice-card:not(.idle) .voice-transcript {
        border-color: rgba(99, 102, 241, 0.42);
        background: rgba(99, 102, 241, 0.12);
      }
      .voice-card .voice-transcript.placeholder {
        color: var(--muted);
        font-style: italic;
      }

      .voice-card .voice-hint {
        font-size: 11px;
        color: var(--muted);
        margin-top: 12px;
      }

      /* Dropzone affordance — only visible while the user is mid-drag. */
      .voice-card .voice-drop-hint {
        position: absolute;
        inset: 6px;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 600;
        color: #4f46e5;
        background: rgba(99, 102, 241, 0.08);
        border: 2px dashed rgba(99, 102, 241, 0.45);
        border-radius: 24px;
        pointer-events: none;
        z-index: 5;
      }
      .voice-card.dragover .voice-drop-hint {
        display: flex;
      }

      .voice-card .voice-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        max-width: 380px;
        margin: 0 auto 6px;
        justify-content: center;
      }
      .voice-card .voice-chips:empty {
        margin: 0;
      }
      .voice-card .voice-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        max-width: 200px;
        padding: 4px 8px 4px 10px;
        font-size: 11px;
        line-height: 1.3;
        color: var(--ink);
        background: rgba(99, 102, 241, 0.1);
        border: 1px solid rgba(99, 102, 241, 0.22);
        border-radius: 999px;
        white-space: nowrap;
        overflow: hidden;
      }
      .voice-card .voice-chip .chip-name {
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .voice-card .voice-chip .chip-dismiss {
        all: unset;
        cursor: pointer;
        color: var(--muted);
        padding: 0 2px;
        border-radius: 6px;
        font-size: 13px;
        line-height: 1;
      }
      .voice-card .voice-chip .chip-dismiss:hover {
        color: #ef4444;
      }

      .voice-card .voice-actions {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 14px;
      }

      .voice-card .voice-actions button {
        font-size: 12px;
        padding: 7px 18px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--surface-soft);
        color: var(--ink);
        cursor: pointer;
        transition: background 120ms ease, transform 120ms ease;
      }

      .voice-card .voice-actions button.primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        color: #fff;
        border-color: transparent;
      }

      .voice-card .voice-actions button:hover {
        transform: translateY(-1px);
      }

      @keyframes voice-in {
        from { opacity: 0; transform: translateY(20px) scale(0.96); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* ─────────────────────────────────────────────────────────────
         NOTE MODE — audio note recording
         ───────────────────────────────────────────────────────────── */
      .voice-card .note-mode-tabs {
        display: flex;
        gap: 6px;
        justify-content: center;
        margin-bottom: 4px;
      }
      .voice-card .note-tab-btn {
        font-size: 11px;
        padding: 4px 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        transition: background 120ms, color 120ms;
      }
      .voice-card .note-tab-btn.active {
        background: var(--ink);
        color: #fff;
        border-color: transparent;
      }

      /* Note-specific elements hide in voice mode, voice-specific elements
         hide in note mode. Using :not([data-mode="note"]) (vs a plain
         .note-only {display:none} rule) sidesteps a specificity war with the
         individual .note-header / .note-channels / .note-transcript-box
         display rules further down the stylesheet. */
      .voice-card:not([data-mode="note"]) .note-only { display: none !important; }
      .voice-card[data-mode="note"] .voice-only { display: none !important; }
      .voice-card[data-mode="note"] .wave-container { display: none !important; }

      .note-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 10px 0 8px;
      }
      .note-header .note-label {
        font-size: 11px;
        color: var(--muted);
        font-weight: 500;
      }
      .note-timer {
        font-size: 13px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.04em;
        color: var(--ink);
      }
      .note-timer.recording {
        color: #ef4444;
      }

      .note-channels {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-bottom: 10px;
      }
      .note-channel-tag {
        font-size: 10px;
        padding: 2px 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--muted);
        background: var(--surface-soft);
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .note-channel-tag .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--muted);
        display: inline-block;
        transition: background 300ms;
      }
      .note-channel-tag.active .dot { background: #10b981; }
      .note-channel-tag.active { color: var(--ink); border-color: rgba(16,185,129,0.3); }
      .note-channel-tag.unavailable { opacity: 0.4; }

      .note-transcript-box {
        max-height: 180px;
        overflow-y: auto;
        background: rgba(99, 102, 241, 0.06);
        border-radius: 14px;
        padding: 10px 14px;
        text-align: left;
        font-size: 13px;
        line-height: 1.6;
        color: var(--ink);
        word-break: break-word;
        scrollbar-width: thin;
        margin-bottom: 4px;
      }
      .note-transcript-box:empty::before {
        content: "等待录音...";
        color: var(--muted);
        font-style: italic;
      }
      .note-transcript-entry {
        margin-bottom: 6px;
      }
      .note-transcript-entry .nt-time {
        font-size: 10px;
        color: var(--muted);
        margin-right: 6px;
        font-variant-numeric: tabular-nums;
      }
      .note-transcript-entry .nt-channel {
        display: inline-block;
        font-size: 10px;
        color: #047857;
        background: rgba(16,185,129,0.12);
        border: 1px solid rgba(16,185,129,0.22);
        border-radius: 999px;
        padding: 0 6px;
        margin-right: 6px;
        line-height: 1.5;
      }
      .note-hint {
        font-size: 10px;
        color: var(--muted);
        margin-top: 6px;
        text-align: center;
      }

      /* ─────────────────────────────────────────────────────────────
         POP BUBBLE — minimal, ephemeral feedback
         ───────────────────────────────────────────────────────────── */
      .pop-bubble {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        max-width: 480px;
        padding: 14px 20px;
        border-radius: 22px;
        background: rgba(28, 28, 30, 0.92);
        color: rgba(255, 255, 255, 0.96);
        font-size: 14px;
        line-height: 1.5;
        box-shadow:
          0 20px 50px rgba(0, 0, 0, 0.28),
          0 4px 16px rgba(0, 0, 0, 0.12);
        backdrop-filter: blur(32px) saturate(180%);
        -webkit-backdrop-filter: blur(32px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        opacity: 0;
        pointer-events: none;
        transition: opacity 260ms ease, transform 260ms cubic-bezier(0.22, 1, 0.36, 1);
        word-break: break-word;
      }

      .pop-bubble[data-open="true"] {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
        pointer-events: auto;
      }

      .pop-bubble .pop-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: rgba(255, 255, 255, 0.55);
        margin-bottom: 4px;
      }

      .pop-bubble .pop-body {
        font-size: 13px;
        line-height: 1.6;
        max-height: 220px;
        overflow-y: auto;
      }

      .pop-bubble .pop-actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .pop-bubble .pop-actions button {
        font-size: 11px;
        padding: 5px 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.92);
        cursor: pointer;
      }

      .pop-bubble .pop-actions button:hover {
        background: rgba(255, 255, 255, 0.16);
      }

      /* Editorial glass pass: align quick overlay with Console */
      :root {
        --bg-0: #f9f9f9;
        --surface: rgba(249, 249, 249, 0.72);
        --surface-strong: rgba(255, 255, 255, 0.78);
        --surface-soft: rgba(243, 243, 243, 0.72);
        --ink: #000000;
        --ink-soft: #1f1f1f;
        --muted: #474747;
        --line: rgba(0, 0, 0, 0.12);
        --accent: #000000;
        --accent-strong: #000000;
        --accent-soft: rgba(226, 226, 226, 0.74);
        --shadow-sm: none;
        --radius-lg: 8px;
        --radius-md: 8px;
        --radius-pill: 999px;
      }

      * {
        letter-spacing: 0 !important;
      }

      .bubble-area,
      .quick-toolbar,
      .input-bar,
      .inline-panel,
      .voice-card,
      .task-list-panel,
      .result-toast {
        border: 0;
        border-radius: 8px;
        background: rgba(249, 249, 249, 0.72);
        backdrop-filter: blur(28px);
        -webkit-backdrop-filter: blur(28px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.82);
      }

      .bubble-area {
        gap: 10px;
        padding: 16px;
      }

      .bubble {
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.68);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 0;
        box-shadow: none;
      }

      .bubble.assistant {
        background: rgba(255, 255, 255, 0.76);
        border: 0;
        border-bottom-left-radius: 8px;
      }

      .bubble.user {
        background: #000000;
        color: #ffffff;
        border-bottom-right-radius: 8px;
        box-shadow: none;
      }

      .bubble.system {
        background: rgba(226, 226, 226, 0.74);
        color: #000000;
      }

      .quick-toolbar {
        padding: 10px 12px;
      }

      .quick-toolbar .quick-btn,
      .bubble-options button,
      .inline-panel .panel-actions button,
      .voice-card .voice-actions button,
      .task-list-filters button {
        border: 0;
        border-radius: 8px;
        background: rgba(226, 226, 226, 0.76);
        color: #000000;
        box-shadow: none;
      }

      .quick-toolbar .quick-btn:hover,
      .bubble-options button:hover,
      .inline-panel .panel-actions button:hover,
      .voice-card .voice-actions button:hover {
        background: rgba(255, 255, 255, 0.86);
        color: #000000;
      }

      .quick-toolbar .quick-btn.active,
      .bubble-options button.active,
      .inline-panel .panel-actions button.primary,
      .voice-card .voice-actions button.primary,
      .task-list-filters button.active {
        background: #000000;
        color: #ffffff;
      }

      .input-bar {
        padding: 13px 14px;
      }

      .input-bar .send-btn,
      .input-bar .aux-btn {
        border: 0;
        box-shadow: none;
      }

      .input-bar .send-btn {
        background: #000000;
        color: #ffffff;
      }

      .input-bar .aux-btn {
        background: rgba(226, 226, 226, 0.74);
        color: #000000;
      }

      .inline-panel input[type="datetime-local"],
      .inline-panel input[type="text"],
      .inline-panel textarea,
      .inline-panel select,
      #voiceLang {
        border: 0;
        border-bottom: 1px solid rgba(0, 0, 0, 0.22);
        border-radius: 0;
        background: transparent;
      }

      .voice-card .voice-transcript {
        background: rgba(255, 255, 255, 0.64);
        border-radius: 8px;
      }

      .wave-bar {
        background: #000000;
      }

      .pop-bubble {
        border: 0;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.86);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.16);
      }

      .pop-bubble .pop-label {
        letter-spacing: 0 !important;
      }

      /* ── particle-collision spinner (replaces tlspin) ── */
      .tl-particles {
        display: inline-flex;align-items:center;justify-content:center;
        width:14px;height:14px;flex-shrink:0;position:relative;
      }
      .tl-particles .p {
        position:absolute;width:3px;height:3px;border-radius:50%;
        background:rgba(60,120,255,0.85);
        animation:pcollide 1.1s ease-in-out infinite;
      }
      .tl-particles .p:nth-child(1){animation-delay:0s;    --px:0px;  --py:-5px;}
      .tl-particles .p:nth-child(2){animation-delay:.01s;  --px:4px;  --py:-3px;}
      .tl-particles .p:nth-child(3){animation-delay:.02s;  --px:5px;  --py: 2px;}
      .tl-particles .p:nth-child(4){animation-delay:.03s;  --px:1px;  --py: 5px;}
      .tl-particles .p:nth-child(5){animation-delay:.04s;  --px:-4px; --py: 3px;}
      .tl-particles .p:nth-child(6){animation-delay:.05s;  --px:-5px; --py:-2px;}
      @keyframes pcollide {
        0%  {transform:translate(var(--px),var(--py));opacity:.3;}
        45% {transform:translate(0,0);opacity:1;}
        55% {transform:translate(0,0);opacity:1;}
        85% {transform:translate(var(--px),var(--py));opacity:.3;}
        100%{transform:translate(var(--px),var(--py));opacity:.3;}
      }

      /* ══════════════════════════════════════════════════════════
         OVERLAY THEMES — synced from console via localStorage
         ══════════════════════════════════════════════════════════ */

      /* ── dark ── */
      body[data-theme="dark"] {
        --ink: #e8e8e8;
        --ink-soft: #c4c4c4;
        --muted: #666666;
        --accent: #e8e8e8;
        --accent-strong: #e8e8e8;
        --accent-soft: rgba(232,232,232,0.1);
        --line: rgba(255,255,255,0.1);
        --surface-strong: rgba(35,35,40,0.9);
        --surface-soft: rgba(22,22,26,0.7);
      }
      body[data-theme="dark"] .bubble-area,
      body[data-theme="dark"] .quick-toolbar,
      body[data-theme="dark"] .input-bar,
      body[data-theme="dark"] .inline-panel,
      body[data-theme="dark"] .voice-card,
      body[data-theme="dark"] .task-list-panel,
      body[data-theme="dark"] .result-toast {
        background: rgba(16, 16, 20, 0.92);
        box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
      }
      body[data-theme="dark"] .bubble {
        background: rgba(32, 32, 38, 0.9);
        color: #e8e8e8;
      }
      body[data-theme="dark"] .bubble.assistant { background: rgba(32,32,38,0.9); }
      body[data-theme="dark"] .bubble.user { background: #e8e8e8; color: #0d0d0d; }
      body[data-theme="dark"] .bubble.system { background: rgba(42,42,50,0.8); color: #888; }
      body[data-theme="dark"] .input-bar textarea { color: #e8e8e8; }
      body[data-theme="dark"] .input-bar textarea::placeholder { color: #555; }
      body[data-theme="dark"] .input-bar .send-btn { background: #e8e8e8; color: #0d0d0d; }
      body[data-theme="dark"] .input-bar .aux-btn { background: rgba(45,45,52,0.9); color: #888; }
      body[data-theme="dark"] .quick-toolbar .quick-btn,
      body[data-theme="dark"] .bubble-options button,
      body[data-theme="dark"] .inline-panel .panel-actions button,
      body[data-theme="dark"] .voice-card .voice-actions button,
      body[data-theme="dark"] .task-list-filters button {
        background: rgba(40,40,48,0.9);
        color: #e8e8e8;
      }
      body[data-theme="dark"] .quick-toolbar .quick-btn:hover,
      body[data-theme="dark"] .bubble-options button:hover { background: rgba(55,55,65,0.9); }
      body[data-theme="dark"] .quick-toolbar .quick-btn.active,
      body[data-theme="dark"] .bubble-options button.active,
      body[data-theme="dark"] .inline-panel .panel-actions button.primary,
      body[data-theme="dark"] .voice-card .voice-actions button.primary,
      body[data-theme="dark"] .task-list-filters button.active {
        background: #e8e8e8;
        color: #0d0d0d;
      }
      body[data-theme="dark"] .wave-bar { background: #e8e8e8; }
      body[data-theme="dark"] .voice-card .voice-transcript { background: rgba(40,40,48,0.8); color: #e8e8e8; }
      body[data-theme="dark"] .result-toast .toast-body { color: #888; }

    </style>
  </head>
  <body>
    <!-- Bubble conversation area -->
    <div id="bubbleArea" class="bubble-area" role="log" aria-live="polite" aria-relevant="additions text" aria-label="对话记录" hidden></div>

    <!-- Empty state — shown when no bubbles exist yet, to orient new users -->
    <div id="emptyState" class="empty-state" aria-hidden="false">
      <div class="empty-state-title">你好，有什么可以帮你？</div>
      <div class="empty-state-hint">直接输入问题，或从下面挑一个开始：</div>
      <div class="empty-state-chips" role="list">
        <button type="button" class="empty-chip" data-empty-prompt="帮我总结一下剪贴板里的内容">📋 总结剪贴板</button>
        <button type="button" class="empty-chip" data-empty-prompt="把下面这段翻译成中文：">🌐 翻译</button>
        <button type="button" class="empty-chip" data-empty-prompt="每天早上 9 点提醒我喝水">⏰ 设置提醒</button>
        <button type="button" class="empty-chip" data-empty-prompt="解释下面这段代码的作用：">💡 解释内容</button>
      </div>
      <div class="empty-state-footnote">
        Ctrl+Shift+U 随时召出 · Enter 发送 · Shift+Enter 换行
      </div>
    </div>

    <!-- UCA-041: Project + history panel (hidden by default) -->
    <div id="projectPanel" class="inline-panel" data-open="false">
      <div class="panel-title">项目与历史</div>
      <div style="display:flex;gap:6px;margin-bottom:8px;">
        <select id="projectDropdown" style="flex:1;font-size:12px;padding:4px 8px;border-radius:6px;background:rgba(255,255,255,0.06);color:inherit;border:1px solid rgba(255,255,255,0.12);"></select>
        <button id="newProjectBtn" type="button" style="font-size:11px;padding:4px 10px;">+ 新项目</button>
      </div>
      <div id="historyList" style="max-height:200px;overflow-y:auto;"></div>
    </div>

    <!-- Inline schedule form (hidden by default) -->
    <div id="schedulePanel" class="inline-panel" data-open="false">
      <div class="panel-title">新建定时任务</div>
      <div class="panel-grid">
        <label for="scheduleWhen">触发时间</label>
        <input id="scheduleWhen" type="datetime-local">
        <label for="scheduleName">任务名称</label>
        <input id="scheduleName" type="text" placeholder="例如：每日翻译播报">
        <label for="scheduleCommand">任务内容</label>
        <textarea id="scheduleCommand" rows="2" placeholder="例如：翻译我剪贴板里的内容并通知我"></textarea>
        <label for="scheduleCategory">类别</label>
        <select id="scheduleCategory">
          <option value="general">General</option>
          <option value="work">Work</option>
          <option value="email">Email</option>
          <option value="reminder" selected>Reminder</option>
          <option value="health">Health</option>
          <option value="custom">Custom</option>
        </select>
        <label for="scheduleLeadTime">提前通知</label>
        <select id="scheduleLeadTime">
          <option value="default">默认（按时间尺度）</option>
          <option value="0">不提前</option>
          <option value="900000">15 分钟</option>
          <option value="3600000">1 小时</option>
          <option value="86400000">1 天</option>
        </select>
      </div>
      <div class="panel-actions">
        <button id="scheduleCancelBtn" type="button">取消</button>
        <button id="scheduleSaveBtn" type="button" class="primary">创建</button>
      </div>
    </div>

    <!-- Apple-style voice card (replaces the old inline panel) -->
    <div id="voiceCard" class="voice-card idle" data-mode="voice">
      <button id="voiceMinimizeBtn" class="voice-minimize" type="button" title="最小化">−</button>
      <!-- Tab switcher: voice / note -->
      <div class="note-mode-tabs">
        <button class="note-tab-btn active" id="tabVoiceBtn" type="button">语音输入</button>
        <button class="note-tab-btn" id="tabNoteBtn" type="button">录音笔记</button>
      </div>

      <!-- Voice-card dropzone: files/images dropped anywhere on the card are
           attached as context; the user can then speak the instruction. -->
      <div id="voiceDropHint" class="voice-drop-hint" aria-hidden="true">拖入文件 / 图片作为上下文</div>
      <div id="voiceChips" class="voice-chips voice-only" role="list" aria-label="已附加的文件"></div>

      <!-- ── VOICE mode elements ── -->
      <div class="voice-subtitle voice-only" id="voiceStatus">点击「开始」后说话</div>
      <div class="wave-container voice-only" aria-hidden="true">
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
      </div>
      <div id="voiceTranscript" class="voice-transcript voice-only placeholder">实时识别的文字会显示在这里…</div>
      <div class="voice-hint voice-only">回车发送 · Esc 取消 · 自动停止后等待新指令</div>
      <select id="voiceLang" class="voice-only" style="margin-top:10px;padding:6px 10px;font-size:12px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,0.92);">
        <option value="zh-CN" selected>中文（普通话）</option>
        <option value="en-US">English (US)</option>
        <option value="ja-JP">日本語</option>
        <option value="ko-KR">한국어</option>
      </select>
      <div class="voice-actions voice-only">
        <button id="voiceCancelBtn" type="button">取消</button>
        <button id="voiceStopBtn" type="button">停止</button>
        <button id="voiceStartBtn" type="button" class="primary">开始</button>
      </div>

      <!-- ── NOTE mode elements ── -->
      <div class="note-header note-only">
        <span class="note-label">记录会话中</span>
        <span class="note-timer" id="noteTimer">00:00</span>
      </div>
      <div class="note-channels note-only">
        <span class="note-channel-tag" id="noteMicTag"><span class="dot"></span>输入音频（麦克风）</span>
        <span class="note-channel-tag" id="noteSysTag"><span class="dot"></span>输出音频（系统）</span>
      </div>
      <div class="note-transcript-box note-only" id="noteTranscriptBox"></div>
      <div class="note-hint note-only">输入音频实时转录 · 输出音频录制后统一处理</div>
      <select id="noteLang" class="note-only" style="margin-top:8px;padding:6px 10px;font-size:12px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,0.92);">
        <option value="auto" selected>自动识别语言</option>
        <option value="zh-CN">中文（普通话）</option>
        <option value="en-US">English (US)</option>
        <option value="ja-JP">日本語</option>
        <option value="ko-KR">한국어</option>
      </select>
      <div class="voice-actions note-only">
        <button id="noteCancelBtn" type="button">取消</button>
        <button id="noteFinishBtn" type="button" class="primary">完成笔记</button>
      </div>
    </div>

    <!-- Quick action toolbar -->
    <div class="quick-toolbar">
      <button id="newSessionBtn" class="quick-btn" type="button" title="开始新会话（清空记忆）">
        <span class="quick-glyph">&#10133;</span>新会话
      </button>
      <button id="projectSelectorBtn" class="quick-btn" type="button" title="切换项目 / 查看历史会话">
        <span class="quick-glyph">&#128218;</span>项目
      </button>
      <button class="quick-btn" data-quick-action="translate" type="button" title="翻译当前上下文">
        <span class="quick-glyph">&#127760;</span>翻译
      </button>
      <button class="quick-btn" data-quick-action="summarize" type="button" title="总结当前上下文">
        <span class="quick-glyph">&#128221;</span>总结
      </button>
      <button class="quick-btn" data-quick-action="explain" type="button" title="解释当前上下文">
        <span class="quick-glyph">&#128161;</span>解释
      </button>
      <button id="scheduleToggleBtn" class="quick-btn" type="button" title="新建定时任务">
        <span class="quick-glyph">&#9200;</span>定时
      </button>
      <button id="voiceToggleBtn" class="quick-btn" type="button" title="语音输入 (Ctrl+Shift+V) / 录音笔记 (Ctrl+Shift+N)">
        <span class="quick-glyph">&#127908;</span>语音
      </button>
      <span class="quick-spacer"></span>
      <button id="settingsBtn" class="quick-btn quick-icon-btn" type="button" title="打开设置">
        <span class="quick-glyph">&#9881;</span>
      </button>
    </div>

    <!-- Bottom input bar -->
    <div class="input-bar" role="group" aria-label="指令输入栏">
      <button id="clipboardBtn" class="aux-btn" type="button" title="读取剪贴板" aria-label="读取剪贴板内容作为上下文">&#128203;</button>
      <textarea id="commandInput" rows="1" placeholder="输入你的需求..." aria-label="输入指令（按 Enter 发送，Shift+Enter 换行）" autofocus></textarea>
      <button id="sendBtn" class="send-btn" type="button" title="发送 (Enter)" aria-label="发送指令">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M3.4 20.4l17.45-8.05a.5.5 0 0 0 0-.91L3.4 3.4a.5.5 0 0 0-.7.6l2.4 7.5a.5.5 0 0 0 .42.34l9.48.9a.1.1 0 0 1 0 .2l-9.48.9a.5.5 0 0 0-.42.34L2.7 19.8a.5.5 0 0 0 .7.6z" fill="currentColor"/>
        </svg>
      </button>
      <button id="closeBtn" class="aux-btn" type="button" title="关闭" aria-label="关闭浮层">&#10005;</button>
    </div>

    <!-- Apple-style ephemeral pop bubble (centered) -->
    <div id="popBubble" class="pop-bubble" data-open="false" role="status" aria-live="polite">
      <div class="pop-label" id="popLabel">UCA</div>
      <div class="pop-body" id="popBody"></div>
      <div class="pop-actions">
        <button id="popOpenBtn" type="button">展开对话</button>
        <button id="popCopyBtn" type="button">复制</button>
      </div>
    </div>

    <!-- Result toast (bottom-right) -->
    <div id="resultToast" class="result-toast" role="status" aria-live="polite">
      <div id="toastTitle" class="toast-title"></div>
      <div id="toastBody" class="toast-body"></div>
      <div class="toast-actions">
        <button id="toastOpenBtn" class="primary" type="button">打开结果</button>
        <button id="toastCopyBtn" class="secondary" type="button">复制</button>
        <button id="toastContinueBtn" class="ghost" type="button">继续追问</button>
      </div>
    </div>

    <!-- Task list dock (bottom-right) -->
    <button id="taskListDock" class="task-list-dock" type="button" title="任务清单" aria-label="打开任务清单" aria-haspopup="true" aria-expanded="false">
      <span aria-hidden="true">📋</span>
      <span id="taskListDockBadge" class="dock-badge" hidden>0</span>
    </button>
    <div id="taskListPanel" class="task-list-panel" data-open="false" role="dialog" aria-label="任务清单">
      <div class="task-list-header">
        <strong style="font-size:12px;">任务清单</strong>
        <button id="taskListCloseBtn" class="aux-btn" type="button" style="width:22px;height:22px;" aria-label="关闭任务清单">×</button>
      </div>
      <div class="task-list-filters" role="tablist" aria-label="任务过滤">
        <button type="button" data-task-filter="all" class="active" role="tab" aria-selected="true">全部</button>
        <button type="button" data-task-filter="active" role="tab" aria-selected="false">进行中</button>
        <button type="button" data-task-filter="done" role="tab" aria-selected="false">已完成</button>
      </div>
      <div id="taskListBody" class="task-list-body" role="list"></div>
    </div>

    <script type="module" src="./overlay.js"></script>
  </body>
</html>
