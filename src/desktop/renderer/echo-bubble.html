<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <title>UCA Echo Bubble</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        width: 260px; height: 64px;
        background: transparent;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
        user-select: none;
      }
      #bubble {
        padding: 10px 16px;
        max-width: 240px;
        border-radius: 16px;
        background: rgba(24, 26, 36, 0.92);
        backdrop-filter: blur(10px);
        color: #f8fafc;
        font-size: 13px;
        line-height: 1.35;
        box-shadow: 0 6px 24px rgba(0,0,0,0.28), 0 0 0 1px rgba(255,255,255,0.08) inset;
        opacity: 0;
        transform: translateY(6px) scale(0.96);
        transition: opacity 200ms ease, transform 320ms cubic-bezier(0.34, 1.56, 0.64, 1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #bubble.show {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      #bubble.kind-wake {
        background: linear-gradient(135deg, rgba(34,197,94,0.96), rgba(21,128,61,0.96));
        box-shadow: 0 8px 28px rgba(34,197,94,0.35), 0 0 0 1px rgba(255,255,255,0.1) inset;
      }
      #bubble.kind-info {
        background: rgba(99,102,241,0.92);
      }
      #bubble.kind-error {
        background: rgba(239,68,68,0.92);
      }
    </style>
  </head>
  <body>
    <div id="bubble" data-no-i18n></div>
    <script>
      const bubble = document.getElementById("bubble");
      let hideTimer = null;
      window.__echoBubbleApi = {
        show({ text = "", kind = "info", durationMs = 1800 } = {}) {
          if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
          bubble.className = "";
          bubble.classList.add(`kind-${kind}`);
          bubble.textContent = text;
          // force reflow for retrigger
          // eslint-disable-next-line no-unused-expressions
          void bubble.offsetWidth;
          bubble.classList.add("show");
          hideTimer = setTimeout(() => {
            bubble.classList.remove("show");
            hideTimer = setTimeout(() => {
              window.echoBubbleShellClient?.hideWindow?.("echo-bubble");
              hideTimer = null;
            }, 360);
          }, durationMs);
        }
      };
    </script>
    <script type="module" src="./i18n-dom-bootstrap.mjs"></script>
    <script src="./echo-bubble-shell-client.js"></script>
    <script src="./echo-bubble.js"></script>
  </body>
</html>
