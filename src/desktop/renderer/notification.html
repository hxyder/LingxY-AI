<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UCA Notification</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: "Segoe UI Variable Text", "Segoe UI", system-ui, sans-serif;
      }
      body {
        display: grid;
        place-items: center;
        padding: 12px;
      }

      .toast {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        border-radius: 16px;
        color: #1a1d24;
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(24px) saturate(1.2);
        -webkit-backdrop-filter: blur(24px) saturate(1.2);
        border: 1px solid rgba(255, 255, 255, 0.7);
        box-shadow:
          0 10px 30px rgba(0, 0, 0, 0.12),
          0 2px 6px rgba(0, 0, 0, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        transform: translateY(20px);
        opacity: 0;
        transition: transform 240ms cubic-bezier(0.34, 1.56, 0.64, 1), opacity 200ms ease;
      }

      .toast.visible {
        transform: translateY(0);
        opacity: 1;
      }

      /* gradient accent bar on the left */
      .toast::before {
        content: "";
        width: 3px;
        align-self: stretch;
        border-radius: 3px;
        background: linear-gradient(180deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
        margin-right: 2px;
        flex-shrink: 0;
      }

      .toast[data-kind="reminder"]::before {
        background: linear-gradient(180deg, #f59e0b 0%, #ef4444 100%);
      }

      .icon {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        flex-shrink: 0;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        color: #fff;
        font-weight: 700;
        font-size: 14px;
        letter-spacing: 0.02em;
        box-shadow: 0 3px 10px rgba(99, 102, 241, 0.3);
      }

      .toast[data-kind="reminder"] .icon {
        background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
        box-shadow: 0 3px 10px rgba(245, 158, 11, 0.32);
      }

      .icon svg {
        width: 18px;
        height: 18px;
      }

      .content {
        flex: 1;
        min-width: 0;
      }

      .title {
        font-size: 13px;
        font-weight: 600;
        color: #1a1d24;
        margin-bottom: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .body {
        font-size: 12px;
        color: #6b7280;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .close {
        width: 24px;
        height: 24px;
        border: none;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.04);
        color: #6b7280;
        cursor: pointer;
        display: grid;
        place-items: center;
        font-size: 16px;
        line-height: 1;
        padding: 0;
        flex-shrink: 0;
        transition: background 140ms ease, color 140ms ease;
      }

      .close:hover {
        background: rgba(0, 0, 0, 0.08);
        color: #1a1d24;
      }
    </style>
  </head>
  <body>
    <section id="toast" class="toast" aria-live="polite">
      <div id="icon" class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6L9 17l-5-5"/>
        </svg>
      </div>
      <div class="content">
        <div id="title" class="title">UCA</div>
        <div id="bodyText" class="body">Notification</div>
      </div>
      <button id="closeBtn" class="close" type="button" aria-label="Close">×</button>
    </section>
    <script type="module" src="./notification.js"></script>
  </body>
</html>
