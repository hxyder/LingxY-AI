<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LingxY</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="popup">
      <header class="hero">
        <p class="eyebrow">LingxY</p>
        <h1>最近任务</h1>
      </header>

      <section class="panel">
        <div class="panel-head">
          <h2>浏览器浮标</h2>
          <span id="overlay-status" class="status-pill">加载中</span>
        </div>
        <label class="field">
          <span>显示模式</span>
          <select id="display-mode">
            <option value="smart">智能显示</option>
            <option value="long_selection_only">仅长选区</option>
            <option value="manual">仅手动</option>
          </select>
        </label>
        <label class="field toggle">
          <input id="overlay-enabled" type="checkbox" checked />
          <span>启用浮标</span>
        </label>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>当前页面</h2>
        </div>
        <button id="explain-page" class="open-console" type="button" style="margin-bottom:6px;">📖 解释此页 / 视频</button>
        <p id="explain-page-status" style="font-size:12px;color:#888;margin:0;min-height:16px;">快捷键 Ctrl+Shift+E（若冲突可在 chrome://extensions/shortcuts 重绑）</p>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>运行模式</h2>
          <span id="mode-pill" class="status-pill">检测中</span>
        </div>
        <p id="mode-detail" class="hint" style="margin:0 0 8px;font-size:12px;color:#595959;min-height:16px;"></p>
        <button id="open-options" class="ghost-btn" type="button">扩展设置（独立模式配置）</button>
      </section>

      <section class="panel chat-panel">
        <div class="panel-head">
          <h2>快速对话</h2>
          <button id="chat-clear" class="ghost-btn chat-clear" type="button" title="清空对话">清空</button>
        </div>
        <div id="chat-history" class="chat-history" aria-live="polite"></div>
        <form id="chat-form" class="chat-form">
          <textarea id="chat-input" class="chat-input" rows="2" placeholder="输入问题，Enter 发送，Shift+Enter 换行"></textarea>
          <button id="chat-send" class="open-console chat-send" type="submit">发送</button>
        </form>
        <p id="chat-status" class="hint chat-status"></p>
      </section>

      <ul id="task-list" class="task-list"></ul>
      <button id="open-console" class="open-console" type="button">打开主控制台</button>
    </main>
    <script type="module" src="./index.js"></script>
  </body>
  </html>
