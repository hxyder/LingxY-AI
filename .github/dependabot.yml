version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      npm-major:
        update-types:
          - "major"
    ignore:
      - dependency-name: "electron"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "unzipper"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "uuid"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      actions-major:
        update-types:
          - "major"
