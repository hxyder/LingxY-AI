name: Repo Baseline

on:
  push:
    branches:
      - main
      - "task/**"
  pull_request:

jobs:
  verify-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm run verify:structure
