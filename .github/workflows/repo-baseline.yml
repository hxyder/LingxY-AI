name: Repo Baseline

on:
  push:
    branches:
      - main
      - "task/**"
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
      - run: npm ci
      - run: npm run verify:github-readiness
      - run: npm run verify:dependency-hygiene
      - run: npm run verify:security-policy
      - run: npm run verify:code-of-conduct
      - run: npm run verify:node-version-baseline
      - run: npm run verify:workflow-permissions
      - run: npm run verify:structure
      - run: npm run verify:doc-references
      - run: npm run verify:local-http-surface
      - run: npm run verify:behavior-tests
