name: Repo Baseline

on:
  push:
    branches:
      - main
      - "task/**"
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run verify:github-readiness
      - run: npm run verify:structure
      - run: npm run verify:local-http-surface
      - run: npm run verify:behavior-tests
