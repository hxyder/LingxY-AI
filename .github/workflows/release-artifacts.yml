name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish when publish_github_release is true, for example v0.1.0"
        required: false
        type: string
      publish_github_release:
        description: "Create or update a draft GitHub Release with the generated artifacts"
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  windows-installer:
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run verify:audit-high
      - run: npm run licenses
      - run: npm run dist
      - name: Copy release notices
        shell: pwsh
        run: |
          Copy-Item LICENSE dist\LICENSE
          Copy-Item THIRD_PARTY_LICENSES.md dist\THIRD_PARTY_LICENSES.md
      - name: Generate checksums
        shell: pwsh
        run: |
          $distRoot = Resolve-Path dist
          $files = Get-ChildItem -Path $distRoot -File -Recurse | Where-Object {
            $_.FullName -notmatch '\\win-unpacked\\'
          } | Sort-Object FullName
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 -Path $file.FullName).Hash.ToLowerInvariant()
            $relative = Resolve-Path -Relative -Path $file.FullName
            "$hash  $relative"
          }
          $lines | Set-Content -Path dist\checksums.sha256 -Encoding utf8
      - uses: actions/upload-artifact@v4
        with:
          name: lingxy-windows-release
          if-no-files-found: error
          path: |
            dist/**
            !dist/win-unpacked/**

  publish-github-release:
    if: ${{ github.event_name == 'push' || inputs.publish_github_release }}
    needs: windows-installer
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: lingxy-windows-release
          path: dist
      - name: Publish draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          LINGXY_RELEASE_EVENT_NAME: ${{ github.event_name }}
          LINGXY_RELEASE_REF_NAME: ${{ github.ref_name }}
          LINGXY_RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
        shell: pwsh
        run: |
          $tag = $env:LINGXY_RELEASE_REF_NAME
          if ($env:LINGXY_RELEASE_EVENT_NAME -ne "push") {
            $tag = $env:LINGXY_RELEASE_TAG_INPUT
          }
          if (-not $tag) {
            throw "release_tag is required when publishing from workflow_dispatch."
          }
          if ($tag -notmatch '^v\d+\.\d+\.\d+([-.+][0-9A-Za-z.-]+)?$') {
            throw "release tag must look like vX.Y.Z, optionally with a prerelease/build suffix. Got: $tag"
          }
          $assets = Get-ChildItem -Path dist -File -Recurse | ForEach-Object { $_.FullName }
          if (-not $assets -or $assets.Count -eq 0) {
            throw "release artifacts are empty."
          }
          $forbiddenAssets = $assets | Where-Object { $_ -match '\\win-unpacked\\' }
          if ($forbiddenAssets) {
            throw "release artifacts must not include win-unpacked output: $($forbiddenAssets -join ', ')"
          }
          foreach ($requiredAsset in @("dist\checksums.sha256", "dist\LICENSE", "dist\THIRD_PARTY_LICENSES.md")) {
            if (-not (Test-Path $requiredAsset -PathType Leaf)) {
              throw "missing required release asset: $requiredAsset"
            }
          }
          $checksums = Get-Content -Path dist\checksums.sha256 -Raw
          foreach ($requiredChecksum in @("LICENSE", "THIRD_PARTY_LICENSES.md")) {
            if ($checksums -notmatch [regex]::Escape($requiredChecksum)) {
              throw "checksums.sha256 must include $requiredChecksum"
            }
          }
          if (gh release view $tag 2>$null) {
            gh release upload $tag @assets --clobber
          } else {
            gh release create $tag @assets --draft --title "LingxY $tag" --notes "Draft LingxY Windows release artifacts generated by GitHub Actions."
          }
