name: Release Gate

on:
  workflow_dispatch:
  push:
    branches:
      - "release/**"

permissions:
  contents: read

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run verify:audit-high
